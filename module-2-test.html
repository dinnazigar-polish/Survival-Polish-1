<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moduł 2 – Test Podsumowujący</title>
    <style>
        :root {
            --primary-salmon: #f49c96;
            --primary-salmon-hover: #e0857f;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-dark: #2c3e50;
            --text-muted: #7f8c8d;
            --border-light: #e2e8f0;
            --shadow-soft: 0 10px 30px rgba(0, 0, 0, 0.05);
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --success-color: #27ae60;
            --error-color: #e74c3c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-dark);
            line-height: 1.6;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .back-link {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
        }

        .back-link:hover {
            color: var(--primary-salmon);
        }

        .progress-bar-container {
            width: 100%;
            height: 10px;
            background-color: var(--border-light);
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 2rem;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--primary-salmon);
            width: 0%;
            transition: width 0.3s ease;
        }

        .quiz-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 2.5rem 2rem;
            box-shadow: var(--shadow-soft);
            border: 2px solid var(--border-light);
        }

        .question-title {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 1.5rem;
        }

        /* Układanka słowna */
        .words-bank, .sentence-builder {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin-bottom: 1.2rem;
            min-height: 52px;
            padding: 0.6rem;
            border-radius: 12px;
        }

        .sentence-builder {
            border: 2px dashed var(--border-light);
            background-color: #fffaf9;
        }

        .word-chip {
            background-color: #ffffff;
            border: 2px solid var(--border-light);
            padding: 0.5rem 1rem;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s ease;
        }

        .word-chip:hover {
            border-color: var(--primary-salmon);
            background-color: #fffaf9;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-bottom: 1.5rem;
        }

        .option-btn {
            background-color: #ffffff;
            border: 2px solid var(--border-light);
            padding: 1rem 1.2rem;
            border-radius: 14px;
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text-dark);
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--primary-salmon);
            background-color: #fffaf9;
        }

        .option-btn.correct {
            border-color: var(--success-color);
            background-color: #eafaf1;
            color: var(--success-color);
        }

        .option-btn.incorrect {
            border-color: var(--error-color);
            background-color: #fdf2f2;
            color: var(--error-color);
        }

        .explanation-box {
            margin-top: 1.5rem;
            padding: 1.2rem;
            background-color: #fffaf9;
            border-radius: 16px;
            border: 2px dashed var(--primary-salmon);
            display: none;
        }

        .explanation-box.visible {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .explanation-title {
            font-weight: 800;
            color: #d96b63;
            margin-bottom: 0.5rem;
        }

        .explanation-text {
            font-size: 0.98rem;
            color: var(--text-dark);
            line-height: 1.5;
        }

        .next-btn {
            width: 100%;
            background-color: var(--primary-salmon);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 1.5rem;
            display: none;
            transition: background-color 0.2s ease;
        }

        .next-btn:hover {
            background-color: var(--primary-salmon-hover);
        }

        .completion-screen {
            text-align: center;
            padding: 3rem 1rem;
            display: none;
        }

        .score-badge {
            font-size: 3rem;
            font-weight: 800;
            color: var(--primary-salmon);
            margin-bottom: 1rem;
        }

        .btn-finish {
            display: inline-block;
            background-color: var(--primary-salmon);
            color: white;
            text-decoration: none;
            padding: 0.9rem 2rem;
            border-radius: 30px;
            font-weight: 700;
            margin-top: 1.5rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <a href="module-2-vocab.html" class="back-link">← Powrót do listy etapów</a>
            <span id="step-counter" style="font-weight: 700; color: var(--text-muted);">Pytanie 1 / 7</span>
        </div>

        <div class="progress-bar-container">
            <div class="progress-fill" id="progress-bar"></div>
        </div>

        <!-- Karta Testu -->
        <div class="quiz-card" id="quiz-card">
            <div class="question-title" id="question-title">---</div>

            <!-- Kontener na budowanie zdania (jeśli dotyczy) -->
            <div id="sentence-container" style="display: none;">
                <div class="sentence-builder" id="sentence-builder"></div>
                <div class="words-bank" id="words-bank"></div>
            </div>

            <!-- Kontener na opcje (ABC lub Prawda/Fałsz) -->
            <div class="options-grid" id="options-grid"></div>

            <!-- Wyjaśnienie / Słowniczek -->
            <div class="explanation-box" id="explanation-box">
                <div class="explanation-title" id="explanation-title">💡 Objaśnienie:</div>
                <div class="explanation-text" id="explanation-text"></div>
            </div>

            <button class="next-btn" id="next-btn" onclick="nextQuestion()">Następne pytanie →</button>
        </div>

        <!-- Ekran Końcowy -->
        <div class="completion-screen" id="completion-screen">
            <h2>🎉 Gratukacje! Test ukończony</h2>
            <div class="score-badge" id="final-score">0 / 7</div>
            <p id="completion-desc">Świetny wynik! Opanowałeś cały Moduł 2.</p>
            <a href="module-2-vocab.html" class="btn-finish" onclick="markStageComplete()">Zapisz i wróć do modułu</a>
        </div>
    </div>

    <script>
        const testQuestions = [
            {
                type: "builder",
                title: "Ułóż poprawne zdanie:",
                targetSentence: ["Moja", "mama", "piecze", "pyszne", "ciasta"],
                distractors: ["gotuje", "zupa"],
                explanationTitle: "💡 Różnica: PIEC a GOTOWAĆ",
                explanationText: `
                    <strong>PIEC</strong> (infinitive: <em>piec</em>) – używamy do ciast, chleba, mięs w piekarniku.<br>
                    <u>Odmiana:</u> ja piekę, ty pieczesz, on/ona piecze, my pieczemy, wy pieczecie, oni/one pieką.<br>
                    <strong>Przykłady z PIEC:</strong> piec ciasto, piec tort, piec chleb, piec kurczaka w piekarniku.<br><br>
                    <strong>GOTOWAĆ</strong> (infinitive: <em>gotować</em>) – używamy w wodzie/garnku lub ogólnie do posiłków.<br>
                    <strong>Przykłady z GOTOWAĆ:</strong> gotować obiad, gotować dla całej rodziny, ugotować makaron, ugotować zupę.
                `
            },
            {
                type: "choice",
                title: "Kto upiekł ten pyszny tort?",
                options: [
                    "Upiekła go moja ciocia.",
                    "Kupiłem go w sklepie odzieżowym.",
                    "Zrobił go mój pies."
                ],
                correct: 0,
                explanationTitle: "💡 Słowniczek: Cukiernia",
                explanationText: "Miejsce, w którym kupuje się ciasta, torty i pączki to <strong>cukiernia</strong> (🇬🇧 <em>pastry shop / bakery / cake shop</em>)."
            },
            {
                type: "builder",
                title: "Ułóż poprawne zdanie:",
                targetSentence: ["Moja", "żona", "jedzie", "po", "dzieci"],
                distractors: ["dziadek", "szkoła"],
                explanationTitle: "💡 Objaśnienie zwrotu:",
                explanationText: "Zwrot <strong>«jechać po dzieci»</strong> oznacza odebranie dzieci (np. ze szkoły lub przedszkola)."
            },
            {
                type: "choice",
                title: "Jedynak to osoba, która nie ma rodzeństwa.",
                options: [
                    "Prawda",
                    "Fałsz"
                ],
                correct: 0,
                explanationTitle: "💡 Słowniczek:",
                explanationText: "<strong>Jedynak</strong> (męski) / <strong>Jedynaczka</strong> (żeński) to dziecko, które nie ma brata ani siostry (🇬🇧 <em>only child</em>)."
            },
            {
                type: "choice",
                title: "Brat mojego ojca to mój dziadek.",
                options: [
                    "Prawda",
                    "Fałsz"
                ],
                correct: 1,
                explanationTitle: "💡 Poprawna relacja rodzinna:",
                explanationText: "To zdanie jest nieprawdziwe. Brat mojego ojca (lub mojej matki) to mój <strong>wujek</strong> (🇬🇧 <em>uncle</em>)."
            },
            {
                type: "choice",
                title: "Lubię mojego ______ brata.",
                options: [
                    "starsi",
                    "starszego",
                    "starszym"
                ],
                correct: 1,
                explanationTitle: "💡 Gramatyka (Biernik):",
                explanationText: "Czasownik «lubić» wymaga Biernika. W liczbie pojedynczej dla przymiotnika męskoosobowego stosujemy końcówkę <strong>-ego</strong>: <em>starszego brata</em>."
            },
            {
                type: "choice",
                title: "Czym zajmuje się Twoja mama?",
                options: [
                    "Jest nauczycielką w szkole.",
                    "Ona ma na imię Anna.",
                    "Moja mama mieszka w Krakowie."
                ],
                correct: 0,
                explanationTitle: "💡 Znaczenie zwrotu: «zajmować się»",
                explanationText: "Pytanie <strong>„Czym zajmuje się...?”</strong> odnosi się do zawodu, pracy lub głównych obowiązków danej osoby (🇬🇧 <em>What does she do for a living / What is her job?</em>)."
            }
        ];

        let currentQuestionIndex = 0;
        let totalScore = 0;
        let selectedSentence = [];

        function renderQuestion() {
            const current = testQuestions[currentQuestionIndex];
            
            document.getElementById('question-title').textContent = current.title;
            
            const sentenceContainer = document.getElementById('sentence-container');
            const optionsGrid = document.getElementById('options-grid');
            const explanationBox = document.getElementById('explanation-box');
            const nextBtn = document.getElementById('next-btn');

            sentenceContainer.style.display = 'none';
            optionsGrid.style.display = 'none';
            optionsGrid.innerHTML = '';
            explanationBox.classList.remove('visible');
            nextBtn.style.display = 'none';

            if (current.type === 'builder') {
                sentenceContainer.style.display = 'block';
                setupSentenceBuilder(current);
            } else if (current.type === 'choice') {
                optionsGrid.style.display = 'flex';
                setupChoiceOptions(current);
            }

            updateProgress();
        }

        function setupSentenceBuilder(questionData) {
            selectedSentence = [];
            const builderElem = document.getElementById('sentence-builder');
            const bankElem = document.getElementById('words-bank');

            builderElem.innerHTML = '';
            bankElem.innerHTML = '';

            const pool = [...questionData.targetSentence, ...questionData.distractors].sort(() => Math.random() - 0.5);

            pool.forEach((word) => {
                const chip = document.createElement('div');
                chip.className = 'word-chip';
                chip.textContent = word;
                chip.onclick = () => handleChipClick(chip, word, questionData);
                bankElem.appendChild(chip);
            });
        }

        function handleChipClick(chip, word, questionData) {
            const builderElem = document.getElementById('sentence-builder');
            const bankElem = document.getElementById('words-bank');

            if (chip.parentElement === bankElem) {
                builderElem.appendChild(chip);
                selectedSentence.push(word);
            } else {
                bankElem.appendChild(chip);
                const index = selectedSentence.indexOf(word);
                if (index > -1) selectedSentence.splice(index, 1);
            }

            // Automatyczne sprawdzenie, gdy użytkownik ułoży całe zdanie
            if (selectedSentence.length === questionData.targetSentence.length) {
                checkSentenceAnswer(questionData);
            }
        }

        function checkSentenceAnswer(questionData) {
            const isCorrect = selectedSentence.join(' ') === questionData.targetSentence.join(' ');
            
            if (isCorrect) {
                totalScore++;
            }

            showExplanation(questionData.explanationTitle, questionData.explanationText);
            
            // Zablokuj kafelki
            const chips = document.querySelectorAll('.word-chip');
            chips.forEach(c => c.onclick = null);

            document.getElementById('next-btn').style.display = 'block';
        }

        function setupChoiceOptions(questionData) {
            const optionsGrid = document.getElementById('options-grid');

            questionData.options.forEach((optText, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = optText;
                btn.onclick = () => selectChoiceAnswer(btn, index, questionData);
                optionsGrid.appendChild(btn);
            });
        }

        function selectChoiceAnswer(selectedBtn, selectedIndex, questionData) {
            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach(btn => btn.disabled = true);

            if (selectedIndex === questionData.correct) {
                selectedBtn.classList.add('correct');
                totalScore++;
            } else {
                selectedBtn.classList.add('incorrect');
                allBtns[questionData.correct].classList.add('correct');
            }

            showExplanation(questionData.explanationTitle, questionData.explanationText);
            document.getElementById('next-btn').style.display = 'block';
        }

        function showExplanation(title, text) {
            const box = document.getElementById('explanation-box');
            document.getElementById('explanation-title').innerHTML = title;
            document.getElementById('explanation-text').innerHTML = text;
            box.classList.add('visible');
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < testQuestions.length) {
                renderQuestion();
            } else {
                showCompletion();
            }
        }

        function updateProgress() {
            const total = testQuestions.length;
            const progressPct = (currentQuestionIndex / total) * 100;
            document.getElementById('progress-bar').style.width = `${progressPct}%`;
            document.getElementById('step-counter').textContent = `Pytanie ${currentQuestionIndex + 1} / ${total}`;
        }

        function showCompletion() {
            document.getElementById('quiz-card').style.display = 'none';
            document.getElementById('completion-screen').style.display = 'block';
            document.getElementById('progress-bar').style.width = '100%';
            document.getElementById('final-score').textContent = `${totalScore} / ${testQuestions.length}`;
            
            const desc = document.getElementById('completion-desc');
            if (totalScore >= 5) {
                desc.textContent = "Świetny wynik! Wszystkie zagadnienia z Modułu 2 są opanowane.";
            } else {
                desc.textContent = "Dobry krok! Warto przejrzeć jeszcze raz niektóre etapy, aby utrwalić wiedzę.";
            }
        }

        function markStageComplete() {
            const MODULE_KEY = 'm2_progress';
            let progress = JSON.parse(localStorage.getItem(MODULE_KEY)) || {};
            progress.stage7 = true;
            localStorage.setItem(MODULE_KEY, JSON.stringify(progress));
        }

        // Start
        renderQuestion();
    </script>
</body>
</html>
