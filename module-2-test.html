<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moduł 2 – Test Podsumowujący (30 pytań)</title>
    <style>
        :root {
            --primary-salmon: #f49c96;
            --primary-salmon-hover: #e0857f;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-dark: #2c3e50;
            --text-muted: #7f8c8d;
            --border-light: #e2e8f0;
            --shadow-soft: 0 10px 30px rgba(0, 0, 0, 0.05);
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --success-color: #27ae60;
            --error-color: #e74c3c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-dark);
            line-height: 1.6;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .back-link {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
        }

        .back-link:hover {
            color: var(--primary-salmon);
        }

        .progress-bar-container {
            width: 100%;
            height: 10px;
            background-color: var(--border-light);
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 2rem;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--primary-salmon);
            width: 0%;
            transition: width 0.3s ease;
        }

        .quiz-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: var(--shadow-soft);
            border: 2px solid var(--border-light);
        }

        .question-title {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 1.2rem;
        }

        /* Input dla pytań ze słownictwem */
        .input-box {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-bottom: 1rem;
        }

        .input-field {
            width: 100%;
            padding: 0.9rem 1.2rem;
            border: 2px solid var(--border-light);
            border-radius: 12px;
            font-size: 1.1rem;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .input-field:focus {
            border-color: var(--primary-salmon);
        }

        .input-field.correct {
            border-color: var(--success-color);
            background-color: #eafaf1;
        }

        .input-field.incorrect {
            border-color: var(--error-color);
            background-color: #fdf2f2;
        }

        .btn-check {
            background-color: var(--primary-salmon);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .btn-check:hover {
            background-color: var(--primary-salmon-hover);
        }

        /* Opcje wyboru (ABC) */
        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-bottom: 1.2rem;
        }

        .option-btn {
            background-color: #ffffff;
            border: 2px solid var(--border-light);
            padding: 1rem 1.2rem;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-dark);
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--primary-salmon);
            background-color: #fffaf9;
        }

        .option-btn.correct {
            border-color: var(--success-color);
            background-color: #eafaf1;
            color: var(--success-color);
        }

        .option-btn.incorrect {
            border-color: var(--error-color);
            background-color: #fdf2f2;
            color: var(--error-color);
        }

        /* Czat Sekwencyjny */
        .chat-container {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-bottom: 1.2rem;
        }

        .chat-bubble {
            max-width: 88%;
            padding: 0.8rem 1.1rem;
            border-radius: 16px;
            font-size: 1rem;
            line-height: 1.4;
            animation: fadeIn 0.3s ease;
        }

        .chat-bubble.speaker-a {
            align-self: flex-start;
            background-color: #f1f5f9;
            color: var(--text-dark);
            border-bottom-left-radius: 4px;
        }

        .chat-bubble.speaker-b {
            align-self: flex-end;
            background-color: #fdf0ef;
            color: #b0463e;
            font-weight: 600;
            border-bottom-right-radius: 4px;
        }

        .speaker-name {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 0.2rem;
            color: var(--text-muted);
        }

        /* Wyjaśnienia i frazy */
        .explanation-box {
            margin-top: 1.2rem;
            padding: 1.2rem;
            background-color: #fffaf9;
            border-radius: 16px;
            border: 2px dashed var(--primary-salmon);
            display: none;
        }

        .explanation-box.visible {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .explanation-title {
            font-weight: 800;
            color: #d96b63;
            margin-bottom: 0.5rem;
        }

        .next-btn {
            width: 100%;
            background-color: var(--primary-salmon);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 1.2rem;
            display: none;
            transition: background-color 0.2s ease;
        }

        .next-btn:hover {
            background-color: var(--primary-salmon-hover);
        }

        .feedback-msg {
            font-weight: 700;
            font-size: 0.95rem;
            margin-top: 0.5rem;
        }

        .feedback-msg.correct { color: var(--success-color); }
        .feedback-msg.incorrect { color: var(--error-color); }

        .completion-screen {
            text-align: center;
            padding: 3rem 1rem;
            display: none;
        }

        .score-badge {
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--primary-salmon);
            margin-bottom: 1rem;
        }

        .btn-finish {
            display: inline-block;
            background-color: var(--primary-salmon);
            color: white;
            text-decoration: none;
            padding: 0.9rem 2rem;
            border-radius: 30px;
            font-weight: 700;
            margin-top: 1.5rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">

                <div id="input-feedback" class="feedback-msg"></div>

            <div class="options-grid" id="options-grid" style="display: none;"></div>

            <div id="type-dialog" style="display: none;">

            <button class="next-btn" id="next-btn" onclick="nextQuestion()">Następne pytanie →</button>

        <!-- Ekran Końcowy -->
        <div class="completion-screen" id="completion-screen">

            <div class="score-badge" id="final-score">0 / 30</div>

    </div>

        let currentQIndex = 0;
        let score = 0;
        let attempts = 0;

        function renderQuestion() {
            const current = testQuestions[currentQIndex];
            
            document.getElementById('question-title').textContent = `${currentQIndex + 1}. ${current.title}`;
            
            const typeInput = document.getElementById('type-input');
            const optionsGrid = document.getElementById('options-grid');
            const typeDialog = document.getElementById('type-dialog');
            const explanationBox = document.getElementById('explanation-box');
            const nextBtn = document.getElementById('next-btn');

            typeInput.style.display = 'none';
            optionsGrid.style.display = 'none';
            typeDialog.style.display = 'none';
            explanationBox.classList.remove('visible');
            nextBtn.style.display = 'none';

            attempts = 0;

            if (current.type === 'input') {
                typeInput.style.display = 'block';
                const inputElem = document.getElementById('user-input');
                inputElem.value = '';
                inputElem.disabled = false;
                inputElem.className = 'input-field';
                document.getElementById('input-feedback').textContent = '';
                document.getElementById('btn-submit-input').disabled = false;
                inputElem.focus();
            } else if (current.type === 'pair') {
                optionsGrid.style.display = 'flex';
                optionsGrid.innerHTML = '';
                current.options.forEach((optText, idx) => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.textContent = optText;
                    btn.onclick = () => selectPairOption(btn, idx, current);
                    optionsGrid.appendChild(btn);
                });
            } else if (current.type === 'dialog') {
                typeDialog.style.display = 'block';
                setupDialogQuestion(current);
            }

            updateProgress();
        }

        // --- OBSŁUGA WEJŚCIA TEKSTOWEGO (3 PRÓBY) ---
        function checkInputAnswer() {
            const current = testQuestions[currentQIndex];
            const inputElem = document.getElementById('user-input');
            const feedback = document.getElementById('input-feedback');
            const userVal = inputElem.value.trim().toLowerCase();
            const correctVal = current.correctWord.toLowerCase();

            if (!userVal) return;

            if (userVal === correctVal) {
                score++;
                inputElem.className = 'input-field correct';
                inputElem.disabled = true;
                feedback.textContent = '✨ Poprawnie!';
                feedback.className = 'feedback-msg correct';
                document.getElementById('btn-submit-input').disabled = true;
                document.getElementById('next-btn').style.display = 'block';
            } else {
                attempts++;
                inputElem.className = 'input-field incorrect';

                if (attempts < 3) {
                    const firstLetter = current.correctWord.charAt(0).toUpperCase();
                    feedback.textContent = `❌ Spróbuj ponownie (Próba ${attempts}/3). Zaczyna się na "${firstLetter}"`;
                    feedback.className = 'feedback-msg incorrect';
                } else {
                    // Po 3 nieudanych próbach przechodzimy dalej
                    inputElem.disabled = true;
                    document.getElementById('btn-submit-input').disabled = true;
                    feedback.textContent = `❌ Poprawna odpowiedź to: "${current.correctWord}"`;
                    feedback.className = 'feedback-msg incorrect';
                    document.getElementById('next-btn').style.display = 'block';
                }
            }
        }

        // --- OBSŁUGA OPCJI ABC / DOPASOWANIA PAR ---
        function selectPairOption(selectedBtn, idx, current) {
            const allBtns = document.querySelectorAll('#options-grid .option-btn');
            allBtns.forEach(btn => btn.disabled = true);

            if (idx === current.correct) {
                selectedBtn.classList.add('correct');
                score++;
            } else {
                selectedBtn.classList.add('incorrect');
                allBtns[current.correct].classList.add('correct');
            }

            showExplanation("💡 Objaśnienie:", current.explanation);
            document.getElementById('next-btn').style.display = 'block';
        }

        // --- OBSŁUGA DIALOGÓW SEKWENCYJNYCH ---
        function setupDialogQuestion(dialogData) {
            const chatContainer = document.getElementById('chat-container');
            const dialogOptions = document.getElementById('dialog-options');

            chatContainer.innerHTML = '';
            dialogOptions.innerHTML = '';

            // KROK 1: Pierwszy komentarz Osoby A
            addBubble('A', dialogData.firstComment);

            // KROK 2: Przyciski wyboru dla Osoby B
            dialogData.choices.forEach((choiceText, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = choiceText;
                btn.onclick = () => handleDialogChoice(idx, choiceText, dialogData);
                dialogOptions.appendChild(btn);
            });
        }

        function handleDialogChoice(selectedIdx, choiceText, dialogData) {
            document.getElementById('dialog-options').innerHTML = '';

            // Wybór Osoby B
            addBubble('B', choiceText);

            if (selectedIdx === dialogData.correct) {
                score++;
            }

            // KROK 3: Ostatni komentarz Osoby A
            setTimeout(() => {
                addBubble('A', dialogData.lastComment);

                // KROK 4: Sekcja tłumaczeń i wyjaśnień
                let htmlPhrases = "<strong>💡 Kluczowe frazy i słownictwo:</strong><br><br>";
                dialogData.phrases.forEach(p => {
                    htmlPhrases += `🔹 <strong>${p.phrase}</strong> (🇬🇧 <em>${p.en}</em>)<br>✏️ Przykład: „${p.ex}”<br><br>`;
                });

                showExplanation("💬 Tłumaczenie i wyrażenia z dialogu:", htmlPhrases);
                document.getElementById('next-btn').style.display = 'block';
            }, 300);
        }

        function addBubble(speaker, text) {
            const chatContainer = document.getElementById('chat-container');
            const bubble = document.createElement('div');
            bubble.className = `chat-bubble ${speaker === 'A' ? 'speaker-a' : 'speaker-b'}`;
            
            const label = document.createElement('div');
            label.className = 'speaker-name';
            label.textContent = speaker === 'A' ? 'Osoba A' : 'Osoba B';

            const txt = document.createElement('div');
            txt.textContent = text;

            bubble.appendChild(label);
            bubble.appendChild(txt);
            chatContainer.appendChild(bubble);
        }

        function showExplanation(title, htmlContent) {
            const box = document.getElementById('explanation-box');
            document.getElementById('explanation-title').innerHTML = title;
            document.getElementById('explanation-text').innerHTML = htmlContent;
            box.classList.add('visible');
        }

        function nextQuestion() {
            currentQIndex++;
            if (currentQIndex < testQuestions.length) {
                renderQuestion();
            } else {
                showCompletion();
            }
        }

        function updateProgress() {
            const total = testQuestions.length;
            const pct = (currentQIndex / total) * 100;
            document.getElementById('progress-bar').style.width = `${pct}%`;
            document.getElementById('step-counter').textContent = `Pytanie ${currentQIndex + 1} / ${total}`;
        }

        function showCompletion() {
            document.getElementById('quiz-card').style.display = 'none';
            document.getElementById('completion-screen').style.display = 'block';
            document.getElementById('progress-bar').style.width = '100%';
            document.getElementById('final-score').textContent = `${score} / ${testQuestions.length}`;
            
            const desc = document.getElementById('completion-desc');
            if (score >= 24) {
                desc.textContent = "Fantastyczny wynik! Doskonale opanowałeś materiał z Modułu 2.";
            } else {
                desc.textContent = "Dobra robota! Warto jeszcze raz przejrzeć poszczególne etapy, aby utrwalić wiedzę.";
            }
        }

        function markStageComplete() {
            const MODULE_KEY = 'm2_progress';
            let progress = JSON.parse(localStorage.getItem(MODULE_KEY)) || {};
            progress.stage7 = true;
            localStorage.setItem(MODULE_KEY, JSON.stringify(progress));
        }

        // Enter zatwierdza wpisywanie w pytaniach z polem tekstowym
        document.getElementById('user-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                checkInputAnswer();
            }
        });

        // Start testu
        renderQuestion();
    </script>
</body>
</html>
