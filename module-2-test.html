<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moduł 2 – Test Podsumowujący</title>
    <style>
        :root {
            --primary-salmon: #f49c96;
            --primary-salmon-hover: #e0857f;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-dark: #2c3e50;
            --text-muted: #7f8c8d;
            --border-light: #e2e8f0;
            --shadow-soft: 0 10px 30px rgba(0, 0, 0, 0.05);
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --success-color: #27ae60;
            --error-color: #e74c3c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-dark);
            line-height: 1.6;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .back-link {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
        }

        .back-link:hover {
            color: var(--primary-salmon);
        }

        .progress-bar-container {
            width: 100%;
            height: 10px;
            background-color: var(--border-light);
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 2rem;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--primary-salmon);
            width: 0%;
            transition: width 0.3s ease;
        }

        .quiz-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: var(--shadow-soft);
            border: 2px solid var(--border-light);
        }

        .question-title {
            font-size: 1.35rem;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 1.2rem;
        }

        /* Sekcja Wpisywania Tekstu */
        .input-box {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-bottom: 1rem;
        }

        .input-field {
            width: 100%;
            padding: 0.9rem 1.2rem;
            border: 2px solid var(--border-light);
            border-radius: 12px;
            font-size: 1.1rem;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .input-field:focus {
            border-color: var(--primary-salmon);
        }

        .input-field.correct {
            border-color: var(--success-color);
            background-color: #eafaf1;
        }

        .input-field.incorrect {
            border-color: var(--error-color);
            background-color: #fdf2f2;
        }

        .btn-check {
            background-color: var(--primary-salmon);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .btn-check:hover:not(:disabled) {
            background-color: var(--primary-salmon-hover);
        }

        .btn-check:disabled {
            background-color: var(--border-light);
            cursor: not-allowed;
        }

        /* Siatka Opcji Wyboru (ABC / Słowa) */
        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-bottom: 1.2rem;
        }

        .option-btn {
            background-color: #ffffff;
            border: 2px solid var(--border-light);
            padding: 1rem 1.2rem;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-dark);
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--primary-salmon);
            background-color: #fffaf9;
        }

        .option-btn.correct {
            border-color: var(--success-color);
            background-color: #eafaf1;
            color: var(--success-color);
        }

        .option-btn.incorrect {
            border-color: var(--error-color);
            background-color: #fdf2f2;
            color: var(--error-color);
        }

        /* Podgląd Dialogu z Luką */
        .dialog-preview {
            background-color: #f1f5f9;
            border-radius: 14px;
            padding: 1.2rem;
            margin-bottom: 1.2rem;
            font-size: 1.05rem;
            line-height: 1.6;
        }

        .dialog-line {
            margin-bottom: 0.6rem;
        }

        .dialog-line:last-child {
            margin-bottom: 0;
        }

        .blank-placeholder {
            display: inline-block;
            font-weight: 800;
            color: #b0463e;
            border-bottom: 2px dashed #b0463e;
            padding: 0 0.4rem;
        }

        /* Sekcja Objaśnień */
        .explanation-box {
            margin-top: 1.2rem;
            padding: 1.2rem;
            background-color: #fffaf9;
            border-radius: 16px;
            border: 2px dashed var(--primary-salmon);
            display: none;
        }

        .explanation-box.visible {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .explanation-title {
            font-weight: 800;
            color: #d96b63;
            margin-bottom: 0.5rem;
        }

        /* Nawigacja Dolna */
        .nav-controls {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .prev-btn {
            flex: 1;
            background-color: #ffffff;
            color: var(--text-dark);
            border: 2px solid var(--border-light);
            padding: 0.9rem;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .prev-btn:hover:not(:disabled) {
            border-color: var(--text-muted);
            background-color: #f1f5f9;
        }

        .prev-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .next-btn {
            flex: 2;
            background-color: var(--primary-salmon);
            color: white;
            border: none;
            padding: 0.9rem;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .next-btn:hover:not(:disabled) {
            background-color: var(--primary-salmon-hover);
        }

        .next-btn:disabled {
            background-color: var(--border-light);
            cursor: not-allowed;
        }

        .feedback-msg {
            font-weight: 700;
            font-size: 0.95rem;
            margin-top: 0.5rem;
        }

        .feedback-msg.correct { color: var(--success-color); }
        .feedback-msg.incorrect { color: var(--error-color); }

        .completion-screen {
            text-align: center;
            padding: 3rem 1rem;
            display: none;
        }

        .score-badge {
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--primary-salmon);
            margin-bottom: 0.5rem;
        }

        .score-percent {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }

        .btn-action-group {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-top: 2rem;
            align-items: center;
        }

        .btn-restart {
            background-color: #ffffff;
            color: var(--text-dark);
            border: 2px solid var(--border-light);
            padding: 0.9rem 2rem;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s ease;
            width: 100%;
            max-width: 280px;
        }

        .btn-restart:hover {
            border-color: var(--primary-salmon);
            color: var(--primary-salmon);
        }

        .btn-finish {
            display: inline-block;
            background-color: var(--primary-salmon);
            color: white;
            text-decoration: none;
            padding: 0.9rem 2rem;
            border-radius: 30px;
            font-weight: 700;
            width: 100%;
            max-width: 280px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <a href="module-2-vocab.html" class="back-link">← Powrót do modułu</a>
            <span id="step-counter" style="font-weight: 700; color: var(--text-muted);">Pytanie 1 / 25</span>
        </div>

        <div class="progress-bar-container">
            <div class="progress-fill" id="progress-bar"></div>
        </div>

        <!-- Karta Testu -->
        <div class="quiz-card" id="quiz-card">
            <div class="question-title" id="question-title">---</div>

            <!-- Typ 1: Wpisywanie słowa (Pytania 1–5) -->
            <div id="type-input" style="display: none;">
                <div class="input-box">
                    <input type="text" id="user-input" class="input-field" placeholder="Wpisz słowo po polsku..." autocomplete="off">
                    <button class="btn-check" id="btn-submit-input" onclick="checkInputAnswer()">Sprawdź odpowiedź</button>
                </div>
                <div id="input-feedback" class="feedback-msg"></div>
            </div>

            <!-- Typ 2: Dialog z luką (Pytania 16–25) -->
            <div id="type-dialog-gap" style="display: none;">
                <div class="dialog-preview" id="dialog-preview"></div>
            </div>

            <!-- Siatka wyboru (Dla dopasowania par i wyboru słów z luki) -->
            <div class="options-grid" id="options-grid" style="display: none;"></div>

            <!-- Wyjaśnienie / Kontekst -->
            <div class="explanation-box" id="explanation-box">
                <div class="explanation-title" id="explanation-title">💡 Objaśnienie:</div>
                <div class="explanation-text" id="explanation-text"></div>
            </div>

            <!-- Nawigacja: Wstecz i Dalej -->
            <div class="nav-controls">
                <button class="prev-btn" id="prev-btn" onclick="prevQuestion()">← Wstecz</button>
                <button class="next-btn" id="next-btn" onclick="nextQuestion()">Następne pytanie →</button>
            </div>
        </div>

        <!-- Ekran Końcowy -->
        <div class="completion-screen" id="completion-screen">
            <h2>🎉 Test Podsumowujący Ukończony!</h2>
            <div class="score-badge" id="final-score">0 / 25</div>
            <div class="score-percent" id="final-percent">0%</div>
            <p id="completion-desc">Oto Twój wynik za cały moduł.</p>

            <div class="btn-action-group">
                <button class="btn-restart" onclick="restartTest()">🔄 Powtórz test</button>
                <a href="module-2-vocab.html" class="btn-finish" onclick="markStageComplete()">Zapisz wynik i wróć</a>
            </div>
        </div>
    </div>

    <script>
        const testQuestions = [
            // --- CZĘŚĆ 1: PODPISAĆ WYRAZY - WPISYWANIE (5 PYTAŃ) ---
            {
                type: "input",
                title: "Wpisz słowo po polsku: 🇬🇧 «grandmother»",
                correctWord: "babcia"
            },
            {
                type: "input",
                title: "Wpisz słowo po polsku: 🇬🇧 «uncle»",
                correctWord: "wujek"
            },
            {
                type: "input",
                title: "Wpisz słowo po polsku: 🇬🇧 «recipe»",
                correctWord: "przepis"
            },
            {
                type: "input",
                title: "Wpisz słowo po polsku: 🇬🇧 «pastry shop / bakery»",
                correctWord: "cukiernia"
            },
            {
                type: "input",
                title: "Wpisz słowo po polsku: 🇬🇧 «retirement»",
                correctWord: "emerytura"
            },

            // --- CZĘŚĆ 2: DOPASOWAĆ PARY - ZESTAW 1 (5 PYTAŃ) ---
            {
                type: "pair",
                title: "Gotować obiad?",
                options: ["to cook dinner", "to drink coffee", "to eat fruit"],
                correct: 0,
                explanation: "<strong>Przykłady w kontekście:</strong><br>• W niedzielę lubię gotować obiad dla całej rodziny.<br>• Moja mama gotuje pyszny obiad na urodziny."
            },
            {
                type: "pair",
                title: "Pić kawę?",
                options: ["to buy a gift", "to drink coffee", "to have siblings"],
                correct: 1,
                explanation: "<strong>Przykłady w kontekście:</strong><br>• Każdego ranka lubię pić kawę z mlekiem.<br>• Pijemy kawę i rozmawiamy o pracy."
            },
            {
                type: "pair",
                title: "Jeść owoce?",
                options: ["to eat fruit", "to cook dinner", "to buy a gift"],
                correct: 0,
                explanation: "<strong>Przykłady w kontekście:</strong><br>• Dzieci powinny codziennie jeść owoce i warzywa.<br>• Latem najchętniej jem świeże owoce z ogrodu."
            },
            {
                type: "pair",
                title: "Kupować prezent?",
                options: ["to have siblings", "to buy a gift", "to drink coffee"],
                correct: 1,
                explanation: "<strong>Przykłady w kontekście:</strong><br>• Idziemy do sklepu kupować prezent dla babci.<br>• Uwielbiam kupować prezenty na Święta."
            },
            {
                type: "pair",
                title: "Mieć rodzeństwo?",
                options: ["to eat fruit", "to cook dinner", "to have siblings"],
                correct: 2,
                explanation: "<strong>Przykłady w kontekście:</strong><br>• Czy masz rodzeństwo, czy jesteś jedynakiem?<br>• Mam duże rodzeństwo – dwóch braci i siostrę."
            },

            // --- CZĘŚĆ 3: DOPASOWAĆ PARY - ZESTAW 2 (5 PYTAŃ) ---
            {
                type: "pair",
                title: "Odbierać dzieci?",
                options: ["to pick up children", "to bake cakes", "difficult task"],
                correct: 0,
                explanation: "<strong>Przykłady w kontekście:</strong><br>• Muszę odebrać dzieci ze szkoły o 15:00."
            },
            {
                type: "pair",
                title: "Nauczać matematyki?",
                options: ["to work in a pastry shop", "to teach mathematics", "difficult task"],
                correct: 1,
                explanation: "<strong>Przykłady w kontekście:</strong><br>• Pan Tomasz naucza matematyki w liceum."
            },
            {
                type: "pair",
                title: "Piec ciasta?",
                options: ["to bake cakes", "to pick up children", "to work in a pastry shop"],
                correct: 0,
                explanation: "<strong>Przykłady w kontekście:</strong><br>• Moja babcia bardzo lubi piec ciasta na weekend."
            },
            {
                type: "pair",
                title: "Pracować w cukierni?",
                options: ["to teach mathematics", "to work in a pastry shop", "difficult task"],
                correct: 1,
                explanation: "<strong>Przykłady w kontekście:</strong><br>• Praca w cukierni jest słodka i przyjemna."
            },
            {
                type: "pair",
                title: "Trudne zadanie?",
                options: ["to pick up children", "to bake cakes", "difficult task"],
                correct: 2,
                explanation: "<strong>Przykłady w kontekście:</strong><br>• Rozwiązanie tego problemu to naprawdę trudne zadanie."
            },

            // --- CZĘŚĆ 4: DIALOGI Z LUKAMI (10 PYTAŃ - Pytania 16–25) ---
            {
                type: "dialogGap",
                title: "Uzupełnij lukę w dialogu 1:",
                speakerA: "Kto zwykle odbiera Wasze dzieci ze szkoły w tygodniu?",
                speakerB_template: "Najczęściej robi to moja żona, ale czasami pomaga nam też ___.",
                speakerA_end: "To bardzo wygodne rozwiązanie!",
                options: ["babcia", "babci", "żona", "sąsiadka"],
                correct: 0,
                explanation: "Mianownik: mowa o osobie (kto?) -> babcia."
            },
            {
                type: "dialogGap",
                title: "Uzupełnij lukę w dialogu 2:",
                speakerA: "Czym zajmuje się Twoja mama?",
                speakerB_template: "Moja mama jest nauczycielką. Naucza ___ i fizyki w szkole.",
                speakerA_end: "Uczenie tego przedmiotu brzmi jak trudne zadanie!",
                options: ["matematyki", "matematyką", "matematyka", "fizyka"],
                correct: 0,
                explanation: "Nauczać + Dopełniacz: nauczać (czego?) -> matematyki."
            },
            {
                type: "dialogGap",
                title: "Uzupełnij lukę w dialogu 3:",
                speakerA: "Kto Ciebie nauczył tak dobrze mówić po polsku?",
                speakerB_template: "Mój ___! Często ze mną rozmawiał, kiedy byłem mały.",
                speakerA_end: "Mówisz naprawdę świetnie i wspaniale!",
                options: ["dziadek", "dziadka", "wujek", "ojciec"],
                correct: 0,
                explanation: "Mianownik r. męski: Mój dziadek."
            },
            {
                type: "dialogGap",
                title: "Uzupełnij lukę w dialogu 4:",
                speakerA: "Kto upiekł ten pyszny tort na Twoje urodziny?",
                speakerB_template: "Moja ciocia! Ona uwielbia piec ___ dla całej rodziny.",
                speakerA_end: "Jest naprawdę wyśmienity! Muszę poprosić ją o przepis.",
                options: ["ciasta", "ciasto", "tortu", "chleb"],
                correct: 0,
                explanation: "Piec (co?) Biernik l. mnoga -> ciasta."
            },
            {
                type: "dialogGap",
                title: "Uzupełnij lukę w dialogu 5:",
                speakerA: "Czy masz rodzeństwo?",
                speakerB_template: "Tak, mam brata i siostrę. Często odwiedzamy rodziców na ___.",
                speakerA_end: "Cudownie! Moi rodzice też już nie pracują.",
                options: ["emeryturze", "emerytura", "pracy", "urlopie"],
                correct: 0,
                explanation: "Na + Miejscownik: na emeryturze."
            },
            {
                type: "dialogGap",
                title: "Uzupełnij lukę w dialogu 6:",
                speakerA: "Jak wygląda Twój najlepszy przyjaciel?",
                speakerB_template: "Jest wysoki, ma krótkie ciemne włosy i nosi ___.",
                speakerA_end: "Wydaje się bardzo miłą i sympatyczną osobą!",
                options: ["okulary", "okularów", "koszula", "zegarek"],
                correct: 0,
                explanation: "Nosić (co?) Biernik l. mnoga -> okulary."
            },
            {
                type: "dialogGap",
                title: "Uzupełnij lukę w dialogu 7:",
                speakerA: "Dokąd jedziecie w ten weekend?",
                speakerB_template: "Jedziemy do naszej babci na niedzielny ___.",
                speakerA_end: "Babcia na pewno ucieszy się z Waszej wizyty!",
                options: ["obiad", "obiadu", "kolacja", "posiłek"],
                correct: 0,
                explanation: "Na + Biernik: na niedzielny obiad."
            },
            {
                type: "dialogGap",
                title: "Uzupełnij lukę w dialogu 8:",
                speakerA: "Gdzie pracuje Twoja siostra?",
                speakerB_template: "Moja siostra pracuje w znanej ___ w centrum miasta.",
                speakerA_end: "To słodka i przyjemna praca!",
                options: ["cukierni", "cukiernia", "piekarnia", "restauracji"],
                correct: 0,
                explanation: "W + Miejscownik r. żeńskiego -> w cukierni."
            },
            {
                type: "dialogGap",
                title: "Uzupełnij lukę w dialogu 9:",
                speakerA: "Co zwykle robisz z żoną rano?",
                speakerB_template: "Zwykle pijemy razem ___ i rozmawiamy przed pracą.",
                speakerA_end: "Nie ma nic lepszego niż spokojny poranek!",
                options: ["kawę", "kawa", "herbatę", "mleko"],
                correct: 0,
                explanation: "Pić (co?) Biernik r. żeńskiego -> kawę."
            },
            {
                type: "dialogGap",
                title: "Uzupełnij lukę w dialogu 10:",
                speakerA: "Co kupujesz dla brata na urodziny?",
                speakerB_template: "Planuję kupować elegancki ___ – dobrą książkę.",
                speakerA_end: "To genialny pomysł, na pewno się ucieszy!",
                options: ["prezent", "prezentu", "upominek", "książkę"],
                correct: 0,
                explanation: "Kupować (co?) Biernik -> prezent."
            }
        ];

        let currentQIndex = 0;
        let attempts = 0;
        // Przechowywanie stanu odpowiedzi dla każdego pytania
        let userAnswers = new Array(testQuestions.length).fill(null);

        function renderQuestion() {
            const current = testQuestions[currentQIndex];
            
            document.getElementById('question-title').textContent = `${currentQIndex + 1}. ${current.title}`;
            
            const typeInput = document.getElementById('type-input');
            const typeDialogGap = document.getElementById('type-dialog-gap');
            const optionsGrid = document.getElementById('options-grid');
            const explanationBox = document.getElementById('explanation-box');
            
            typeInput.style.display = 'none';
            typeDialogGap.style.display = 'none';
            optionsGrid.style.display = 'none';
            explanationBox.classList.remove('visible');

            // Kontrola przycisku Wstecz
            document.getElementById('prev-btn').disabled = (currentQIndex === 0);

            // Stan poprzednio zapisanej odpowiedzi
            const savedAns = userAnswers[currentQIndex];

            if (current.type === 'input') {
                typeInput.style.display = 'block';
                const inputElem = document.getElementById('user-input');
                const feedback = document.getElementById('input-feedback');
                const btnSubmit = document.getElementById('btn-submit-input');

                feedback.textContent = '';
                attempts = savedAns ? savedAns.attempts : 0;

                if (savedAns && savedAns.completed) {
                    inputElem.value = savedAns.val;
                    inputElem.disabled = true;
                    btnSubmit.disabled = true;
                    if (savedAns.isCorrect) {
                        inputElem.className = 'input-field correct';
                        feedback.textContent = '✨ Poprawnie!';
                        feedback.className = 'feedback-msg correct';
                    } else {
                        inputElem.className = 'input-field incorrect';
                        feedback.textContent = `❌ Prawidłowa odpowiedź: "${current.correctWord}"`;
                        feedback.className = 'feedback-msg incorrect';
                    }
                    enableNextButton(true);
                } else {
                    inputElem.value = '';
                    inputElem.disabled = false;
                    inputElem.className = 'input-field';
                    btnSubmit.disabled = false;
                    enableNextButton(false);
                    inputElem.focus();
                }

            } else if (current.type === 'pair' || current.type === 'dialogGap') {
                if (current.type === 'dialogGap') {
                    typeDialogGap.style.display = 'block';
                    const preview = document.getElementById('dialog-preview');
                    
                    let filledText = "___";
                    if (savedAns && savedAns.completed) {
                        filledText = current.options[savedAns.selectedIdx];
                    }

                    const templateWithBlank = current.speakerB_template.replace("___", `<span class="blank-placeholder">${filledText}</span>`);

                    preview.innerHTML = `
                        <div class="dialog-line"><strong>Osoba A:</strong> ${current.speakerA}</div>
                        <div class="dialog-line"><strong>Osoba B:</strong> ${templateWithBlank}</div>
                        <div class="dialog-line"><strong>Osoba A:</strong> ${current.speakerA_end}</div>
                    `;
                }

                optionsGrid.style.display = 'flex';
                optionsGrid.innerHTML = '';

                current.options.forEach((optText, idx) => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.textContent = optText;

                    if (savedAns && savedAns.completed) {
                        btn.disabled = true;
                        if (idx === current.correct) {
                            btn.classList.add('correct');
                        }
                        if (idx === savedAns.selectedIdx && !savedAns.isCorrect) {
                            btn.classList.add('incorrect');
                        }
                    } else {
                        btn.onclick = () => selectOption(btn, idx, current);
                    }
                    optionsGrid.appendChild(btn);
                });

                if (savedAns && savedAns.completed) {
                    showExplanation(current.explanation);
                    enableNextButton(true);
                } else {
                    enableNextButton(false);
                }
            }

            updateProgress();
        }

        // --- WPISYWANIE SŁOWA (MAX 3 PRÓBY) ---
        function checkInputAnswer() {
            const current = testQuestions[currentQIndex];
            const inputElem = document.getElementById('user-input');
            const feedback = document.getElementById('input-feedback');
            const btnSubmit = document.getElementById('btn-submit-input');
            const userVal = inputElem.value.trim().toLowerCase();
            const correctVal = current.correctWord.toLowerCase();

            if (!userVal) return;

            if (userVal === correctVal) {
                inputElem.className = 'input-field correct';
                inputElem.disabled = true;
                btnSubmit.disabled = true;
                feedback.textContent = '✨ Poprawnie!';
                feedback.className = 'feedback-msg correct';

                userAnswers[currentQIndex] = { completed: true, isCorrect: true, val: userVal, attempts: attempts + 1 };
                enableNextButton(true);
            } else {
                attempts++;
                inputElem.className = 'input-field incorrect';

                if (attempts < 3) {
                    const firstLetter = current.correctWord.charAt(0).toUpperCase();
                    feedback.textContent = `❌ Niepoprawnie (Próba ${attempts}/3). Podpowiedź: zaczyna się na "${firstLetter}"`;
                    feedback.className = 'feedback-msg incorrect';
                } else {
                    inputElem.disabled = true;
                    btnSubmit.disabled = true;
                    feedback.textContent = `❌ Brak prób. Poprawna odpowiedź: "${current.correctWord}"`;
                    feedback.className = 'feedback-msg incorrect';

                    userAnswers[currentQIndex] = { completed: true, isCorrect: false, val: userVal, attempts: attempts };
                    enableNextButton(true);
                }
            }
        }

        // --- SELEKCJA OPCJI (WYBÓR ABC / SŁOWA Z LUKI) ---
        function selectOption(selectedBtn, idx, current) {
            const allBtns = document.querySelectorAll('#options-grid .option-btn');
            allBtns.forEach(btn => btn.disabled = true);

            const isCorrect = (idx === current.correct);

            if (isCorrect) {
                selectedBtn.classList.add('correct');
            } else {
                selectedBtn.classList.add('incorrect');
                allBtns[current.correct].classList.add('correct');
            }

            userAnswers[currentQIndex] = { completed: true, isCorrect: isCorrect, selectedIdx: idx };

            if (current.type === 'dialogGap') {
                const preview = document.getElementById('dialog-preview');
                const templateWithBlank = current.speakerB_template.replace("___", `<span class="blank-placeholder">${current.options[idx]}</span>`);
                preview.innerHTML = `
                    <div class="dialog-line"><strong>Osoba A:</strong> ${current.speakerA}</div>
                    <div class="dialog-line"><strong>Osoba B:</strong> ${templateWithBlank}</div>
                    <div class="dialog-line"><strong>Osoba A:</strong> ${current.speakerA_end}</div>
                `;
            }

            showExplanation(current.explanation);
            enableNextButton(true);
        }

        function showExplanation(htmlContent) {
            if (!htmlContent) return;
            const box = document.getElementById('explanation-box');
            document.getElementById('explanation-text').innerHTML = htmlContent;
            box.classList.add('visible');
        }

        function enableNextButton(enable) {
            document.getElementById('next-btn').disabled = !enable;
        }

        function nextQuestion() {
            if (currentQIndex < testQuestions.length - 1) {
                currentQIndex++;
                renderQuestion();
            } else {
                showCompletion();
            }
        }

        function prevQuestion() {
            if (currentQIndex > 0) {
                currentQIndex--;
                renderQuestion();
            }
        }

        function updateProgress() {
            const total = testQuestions.length;
            const pct = ((currentQIndex + 1) / total) * 100;
            document.getElementById('progress-bar').style.width = `${pct}%`;
            document.getElementById('step-counter').textContent = `Pytanie ${currentQIndex + 1} / ${total}`;
        }

        function calculateScore() {
            let totalScore = 0;
            userAnswers.forEach(ans => {
                if (ans && ans.isCorrect) {
                    totalScore++;
                }
            });
            return totalScore;
        }

        function showCompletion() {
            document.getElementById('quiz-card').style.display = 'none';
            document.getElementById('completion-screen').style.display = 'block';
            document.getElementById('progress-bar').style.width = '100%';

            const score = calculateScore();
            const total = testQuestions.length;
            const pct = Math.round((score / total) * 100);

            document.getElementById('final-score').textContent = `${score} / ${total}`;
            document.getElementById('final-percent').textContent = `${pct}%`;

            let desc = "Oto Twój wynik za cały moduł.";
            if (pct === 100) desc = "🏆 Genialnie! Perfekcyjny wynik!";
            else if (pct >= 80) desc = "👏 Bardzo dobry wynik! Świetna robota!";
            else if (pct >= 50) desc = "👍 Dobry wynik, ale możesz jeszcze powtórzyć materiał.";
            else desc = "💪 Warto powtórzyć słownictwo i spróbować ponownie!";

            document.getElementById('completion-desc').textContent = desc;
        }

        function restartTest() {
            currentQIndex = 0;
            attempts = 0;
            userAnswers = new Array(testQuestions.length).fill(null);
            document.getElementById('quiz-card').style.display = 'block';
            document.getElementById('completion-screen').style.display = 'none';
            renderQuestion();
        }

        function markStageComplete() {
            const score = calculateScore();
            const total = testQuestions.length;
            const pct = Math.round((score / total) * 100);
            
            // Zapis wyniku w localStorage dla modułu 2
            localStorage.setItem('module2_test_score', pct);
            localStorage.setItem('module2_completed', 'true');
        }

        // Inicjalizacja pierwszej karty po załadowaniu
        document.addEventListener("DOMContentLoaded", () => {
            renderQuestion();
        });
    </script>
</body>
</html>
