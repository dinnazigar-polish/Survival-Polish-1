<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moduł 1 – Test końcowy</title>
    <style>
        :root {
            --primary-salmon: #f49c96;
            --primary-salmon-hover: #e0857f;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-dark: #2c3e50;
            --text-muted: #7f8c8d;
            --border-light: #e2e8f0;
            --shadow-soft: 0 10px 30px rgba(0, 0, 0, 0.05);
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --success-color: #27ae60;
            --error-color: #e74c3c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-dark);
            line-height: 1.6;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .back-link {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
        }

        .back-link:hover {
            color: var(--primary-salmon);
        }

        .progress-bar-container {
            width: 100%;
            height: 10px;
            background-color: var(--border-light);
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 2rem;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--primary-salmon);
            width: 0%;
            transition: width 0.3s ease;
        }

        .quiz-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: var(--shadow-soft);
            border: 2px solid var(--border-light);
        }

        .question-title {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 1.2rem;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-bottom: 1.2rem;
        }

        .option-btn {
            background-color: #ffffff;
            border: 2px solid var(--border-light);
            border-radius: 12px;
            padding: 0.9rem 1.2rem;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-dark);
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--primary-salmon);
            background-color: #fffaf9;
        }

        .option-btn.selected {
            border-color: var(--primary-salmon);
            background-color: #fde8e7;
        }

        .option-btn.correct {
            border-color: var(--success-color);
            background-color: #eafaf1;
            color: var(--success-color);
        }

        .option-btn.incorrect {
            border-color: var(--error-color);
            background-color: #fdf2f2;
            color: var(--error-color);
        }

        .checkbox-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.8rem;
            margin-bottom: 1.2rem;
        }

        .checkbox-item {
            background-color: #ffffff;
            border: 2px solid var(--border-light);
            border-radius: 12px;
            padding: 0.9rem 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            user-select: none;
            transition: all 0.2s ease;
        }

        .checkbox-item:hover {
            border-color: var(--primary-salmon);
        }

        .checkbox-item.selected {
            border-color: var(--primary-salmon);
            background-color: #fffaf9;
        }

        .checkbox-item input {
            accent-color: var(--primary-salmon);
            width: 18px;
            height: 18px;
        }

        .input-box {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-bottom: 1rem;
        }

        .input-field {
            width: 100%;
            padding: 0.9rem 1.2rem;
            border: 2px solid var(--border-light);
            border-radius: 12px;
            font-size: 1.1rem;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .input-field:focus {
            border-color: var(--primary-salmon);
        }

        .input-field.correct {
            border-color: var(--success-color);
            background-color: #eafaf1;
        }

        .input-field.incorrect {
            border-color: var(--error-color);
            background-color: #fdf2f2;
        }

        .btn-check {
            background-color: var(--primary-salmon);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .btn-check:hover:not(:disabled) {
            background-color: var(--primary-salmon-hover);
        }

        .btn-check:disabled {
            background-color: var(--border-light);
            cursor: not-allowed;
        }

        .feedback-msg {
            font-weight: 700;
            font-size: 0.95rem;
            margin-top: 0.5rem;
        }

        .feedback-msg.correct { color: var(--success-color); }
        .feedback-msg.incorrect { color: var(--error-color); }

        .nav-controls {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .prev-btn {
            flex: 1;
            background-color: #ffffff;
            color: var(--text-dark);
            border: 2px solid var(--border-light);
            padding: 0.9rem;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .prev-btn:hover:not(:disabled) {
            border-color: var(--text-muted);
            background-color: #f1f5f9;
        }

        .prev-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .next-btn {
            flex: 2;
            background-color: var(--primary-salmon);
            color: white;
            border: none;
            padding: 0.9rem;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .next-btn:hover:not(:disabled) {
            background-color: var(--primary-salmon-hover);
        }

        .next-btn:disabled {
            background-color: var(--border-light);
            cursor: not-allowed;
        }

        .completion-screen {
            text-align: center;
            padding: 3rem 1rem;
            display: none;
        }

        .score-badge {
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--primary-salmon);
            margin-bottom: 0.5rem;
        }

        .score-percent {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }

        .btn-action-group {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-top: 2rem;
            align-items: center;
        }

        .btn-restart {
            background-color: #ffffff;
            color: var(--text-dark);
            border: 2px solid var(--border-light);
            padding: 0.9rem 2rem;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s ease;
            width: 100%;
            max-width: 280px;
        }

        .btn-restart:hover {
            border-color: var(--primary-salmon);
            color: var(--primary-salmon);
        }

        .btn-finish {
            display: inline-block;
            background-color: var(--primary-salmon);
            color: white;
            text-decoration: none;
            padding: 0.9rem 2rem;
            border-radius: 30px;
            font-weight: 700;
            width: 100%;
            max-width: 280px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <a href="module-2-vocab.html" class="back-link">← Powrót do modułu</a>
            <span id="step-counter" style="font-weight: 700; color: var(--text-muted);">Pytanie 1 / 5</span>
        </div>

        <div class="progress-bar-container">
            <div class="progress-fill" id="progress-bar"></div>
        </div>

        <!-- Karta Pytania -->
        <div class="quiz-card" id="quiz-card">
            <div class="question-title" id="question-title"></div>
            <div id="quiz-content"></div>
            <div id="input-feedback" class="feedback-msg"></div>

            <div class="nav-controls">
                <button class="prev-btn" id="prev-btn" onclick="prevQuestion()">← Wstecz</button>
                <button class="next-btn" id="next-btn" onclick="nextQuestion()">Następne pytanie (Enter) →</button>
            </div>
        </div>

        <!-- Ekran Końcowy -->
        <div class="completion-screen" id="completion-screen">
            <h2>🎉 Test Ukończony!</h2>
            <div class="score-badge" id="final-score">0 / 5</div>
            <div class="score-percent" id="final-percent">0%</div>
            <p id="completion-desc">Świetnie! Ukończyłeś test sprawdzający Moduł 1.</p>

            <div class="btn-action-group">
                <button class="btn-restart" onclick="restartQuiz()">🔄 Powtórz test</button>
                <a href="module-2-vocab.html" class="btn-finish" onclick="markStageComplete()">Przejdź do Modułu 2</a>
            </div>
        </div>
    </div>

    <script>
        const testQuestions = [
            {
                type: "checkbox",
                title: "1. Owoce to:",
                options: ["Jabłko", "Chleb", "Truskawka", "Ser", "Banan", "Pomidor"],
                correctIndices: [0, 2, 4]
            },
            {
                type: "text",
                title: "2. „Apple pie” po polsku to?",
                correct: "szarlotka"
            },
            {
                type: "radio",
                title: "3. Poproszę ...",
                options: ["zimna woda", "zimniej wody", "zimną wodę"],
                correctIndex: 2
            },
            {
                type: "radio",
                title: "4. Sery, mleko i masło muszę spakować do ________.",
                options: ["torby", "torba", "torbą"],
                correctIndex: 0
            },
            {
                type: "text",
                title: "5. Co pijemy rano na pobudzenie? (wpisz słowo)",
                correct: "kawa"
            }
        ];

        let currentIndex = 0;
        let attempts = 0;
        let userAnswers = new Array(testQuestions.length).fill(null);

        function renderQuestion() {
            const q = testQuestions[currentIndex];
            document.getElementById('question-title').textContent = q.title;
            const container = document.getElementById('quiz-content');
            const feedback = document.getElementById('input-feedback');
            const prevBtn = document.getElementById('prev-btn');

            feedback.textContent = '';
            container.innerHTML = '';
            prevBtn.disabled = (currentIndex === 0);

            const saved = userAnswers[currentIndex];

            if (q.type === 'text') {
                const box = document.createElement('div');
                box.className = 'input-box';

                const input = document.createElement('input');
                input.type = 'text';
                input.id = 'user-input';
                input.className = 'input-field';
                input.placeholder = 'Wpisz odpowiedź...';
                input.autocomplete = 'off';

                const btn = document.createElement('button');
                btn.className = 'btn-check';
                btn.id = 'btn-submit';
                btn.textContent = 'Sprawdź odpowiedź';
                btn.onclick = checkTextAnswer;

                box.appendChild(input);
                box.appendChild(btn);
                container.appendChild(box);

                if (saved && saved.completed) {
                    input.value = saved.val;
                    input.disabled = true;
                    btn.disabled = true;
                    if (saved.isCorrect) {
                        input.className = 'input-field correct';
                        feedback.textContent = '✨ Poprawnie!';
                        feedback.className = 'feedback-msg correct';
                    } else {
                        input.className = 'input-field incorrect';
                        feedback.textContent = `❌ Prawidłowa odpowiedź: "${q.correct}"`;
                        feedback.className = 'feedback-msg incorrect';
                    }
                    enableNextButton(true);
                } else {
                    attempts = 0;
                    enableNextButton(false);
                    setTimeout(() => input.focus(), 50);
                }
            } else if (q.type === 'radio') {
                const list = document.createElement('div');
                list.className = 'options-container';

                q.options.forEach((opt, idx) => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.textContent = opt;

                    if (saved && saved.completed) {
                        btn.disabled = true;
                        if (idx === q.correctIndex) {
                            btn.className = 'option-btn correct';
                        } else if (saved.selected === idx) {
                            btn.className = 'option-btn incorrect';
                        }
                    } else {
                        btn.onclick = () => selectRadioAnswer(idx);
                    }

                    list.appendChild(btn);
                });

                container.appendChild(list);

                if (saved && saved.completed) {
                    feedback.textContent = saved.isCorrect ? '✨ Poprawnie!' : `❌ Prawidłowa odpowiedź: ${q.options[q.correctIndex]}`;
                    feedback.className = `feedback-msg ${saved.isCorrect ? 'correct' : 'incorrect'}`;
                    enableNextButton(true);
                } else {
                    enableNextButton(false);
                }
            } else if (q.type === 'checkbox') {
                const grid = document.createElement('div');
                grid.className = 'checkbox-grid';

                q.options.forEach((opt, idx) => {
                    const label = document.createElement('label');
                    label.className = 'checkbox-item';

                    const chk = document.createElement('input');
                    chk.type = 'checkbox';
                    chk.value = idx;

                    if (saved && saved.completed) {
                        chk.disabled = true;
                        chk.checked = saved.selected.includes(idx);
                        if (q.correctIndices.includes(idx)) {
                            label.style.borderColor = 'var(--success-color)';
                            label.style.backgroundColor = '#eafaf1';
                        } else if (saved.selected.includes(idx)) {
                            label.style.borderColor = 'var(--error-color)';
                            label.style.backgroundColor = '#fdf2f2';
                        }
                    } else {
                        chk.onchange = () => {
                            if (chk.checked) label.classList.add('selected');
                            else label.classList.remove('selected');
                        };
                    }

                    label.appendChild(chk);
                    label.appendChild(document.createTextNode(opt));
                    grid.appendChild(label);
                });

                container.appendChild(grid);

                if (!saved || !saved.completed) {
                    const btn = document.createElement('button');
                    btn.className = 'btn-check';
                    btn.style.width = '100%';
                    btn.textContent = 'Sprawdź wybrane';
                    btn.onclick = checkCheckboxAnswer;
                    container.appendChild(btn);
                    enableNextButton(false);
                } else {
                    feedback.textContent = saved.isCorrect ? '✨ Wszystkie poprawne zaznaczone!' : '❌ Niezupełnie dobrze.';
                    feedback.className = `feedback-msg ${saved.isCorrect ? 'correct' : 'incorrect'}`;
                    enableNextButton(true);
                }
            }

            updateProgress();
        }

        function checkTextAnswer() {
            const q = testQuestions[currentIndex];
            const input = document.getElementById('user-input');
            const btn = document.getElementById('btn-submit');
            const feedback = document.getElementById('input-feedback');

            const val = input.value.trim().toLowerCase();
            const correctVal = q.correct.toLowerCase();

            if (!val) return;

            if (val === correctVal) {
                input.className = 'input-field correct';
                input.disabled = true;
                btn.disabled = true;
                feedback.textContent = '✨ Poprawnie!';
                feedback.className = 'feedback-msg correct';

                userAnswers[currentIndex] = { completed: true, isCorrect: true, val: input.value };
                enableNextButton(true);
            } else {
                attempts++;
                input.className = 'input-field incorrect';

                if (attempts < 3) {
                    feedback.textContent = `❌ Niepoprawnie (Próba ${attempts}/3). Spróbuj ponownie!`;
                    feedback.className = 'feedback-msg incorrect';
                } else {
                    input.value = q.correct;
                    input.disabled = true;
                    btn.disabled = true;
                    feedback.textContent = `❌ Brak prób. Prawidłowa odpowiedź to: "${q.correct}"`;
                    feedback.className = 'feedback-msg incorrect';

                    userAnswers[currentIndex] = { completed: true, isCorrect: false, val: q.correct };
                    enableNextButton(true);
                }
            }
        }

        function selectRadioAnswer(idx) {
            const q = testQuestions[currentIndex];
            const isCorrect = (idx === q.correctIndex);
            userAnswers[currentIndex] = { completed: true, isCorrect: isCorrect, selected: idx };
            renderQuestion();
        }

        function checkCheckboxAnswer() {
            const q = testQuestions[currentIndex];
            const checkedInputs = Array.from(document.querySelectorAll('.checkbox-grid input:checked')).map(i => parseInt(i.value));

            const isCorrect = q.correctIndices.length === checkedInputs.length &&
                q.correctIndices.every(val => checkedInputs.includes(val));

            userAnswers[currentIndex] = { completed: true, isCorrect: isCorrect, selected: checkedInputs };
            renderQuestion();
        }

        function enableNextButton(enable) {
            document.getElementById('next-btn').disabled = !enable;
        }

        function nextQuestion() {
            if (currentIndex < testQuestions.length - 1) {
                currentIndex++;
                renderQuestion();
            } else {
                showCompletion();
            }
        }

        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            }
        }

        function updateProgress() {
            const total = testQuestions.length;
            const pct = ((currentIndex + 1) / total) * 100;
            document.getElementById('progress-bar').style.width = `${pct}%`;
            document.getElementById('step-counter').textContent = `Pytanie ${currentIndex + 1} / ${total}`;
        }

        function calculateScore() {
            let total = 0;
            userAnswers.forEach(ans => {
                if (ans && ans.isCorrect) total++;
            });
            return total;
        }

        function showCompletion() {
            document.getElementById('quiz-card').style.display = 'none';
            document.getElementById('completion-screen').style.display = 'block';
            document.getElementById('progress-bar').style.width = '100%';

            const score = calculateScore();
            const total = testQuestions.length;
            const percent = Math.round((score / total) * 100);

            document.getElementById('final-score').textContent = `${score} / ${total}`;
            document.getElementById('final-percent').textContent = `${percent}%`;
        }

        function restartQuiz() {
            currentIndex = 0;
            userAnswers = new Array(testQuestions.length).fill(null);
            document.getElementById('completion-screen').style.display = 'none';
            document.getElementById('quiz-card').style.display = 'block';
            renderQuestion();
        }

        function markStageComplete() {
            const MODULE_KEY = 'm1_progress';
            let progress = JSON.parse(localStorage.getItem(MODULE_KEY)) || {};
            progress.test = true;
            localStorage.setItem(MODULE_KEY, JSON.stringify(progress));
        }

        document.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
                const saved = userAnswers[currentIndex];
                if (saved && saved.completed) {
                    const nextBtn = document.getElementById('next-btn');
                    if (!nextBtn.disabled) {
                        nextQuestion();
                    }
                } else if (testQuestions[currentIndex].type === 'text') {
                    checkTextAnswer();
                }
            }
        });

        renderQuestion();
    </script>
</body>
</html>
