<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moduł 1 – Test końcowy</title>
    <style>
        :root {
            --primary-green: #22c55e;
            --primary-green-hover: #16a34a;
            --primary-green-light: #f0fdf4;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --border-light: #e2e8f0;
            --shadow-soft: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --success-color: #16a34a;
            --error-color: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-dark);
            line-height: 1.6;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .back-link {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
        }

        .back-link:hover {
            color: var(--primary-green);
        }

        .progress-bar-container {
            width: 100%;
            height: 12px;
            background-color: var(--border-light);
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 2rem;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--primary-green);
            width: 0%;
            transition: width 0.3s ease;
        }

        .quiz-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: var(--shadow-soft);
            border: 2px solid var(--border-light);
        }

        .question-title {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 1.5rem;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-bottom: 1.2rem;
        }

        .option-btn {
            background-color: #ffffff;
            border: 2px solid var(--border-light);
            border-radius: 14px;
            padding: 1rem 1.2rem;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-dark);
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--primary-green);
            background-color: var(--primary-green-light);
        }

        .option-btn.selected {
            border-color: var(--primary-green);
            background-color: var(--primary-green-light);
        }

        .option-btn.correct {
            border-color: var(--success-color);
            background-color: #dcfce7;
            color: var(--success-color);
        }

        .option-btn.incorrect {
            border-color: var(--error-color);
            background-color: #fee2e2;
            color: var(--error-color);
        }

        .checkbox-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 0.8rem;
            margin-bottom: 1.2rem;
        }

        .checkbox-item {
            background-color: #ffffff;
            border: 2px solid var(--border-light);
            border-radius: 12px;
            padding: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            user-select: none;
            transition: all 0.2s ease;
        }

        .checkbox-item:hover {
            border-color: var(--primary-green);
        }

        .checkbox-item.selected {
            border-color: var(--primary-green);
            background-color: var(--primary-green-light);
        }

        .checkbox-item input {
            accent-color: var(--primary-green);
            width: 20px;
            height: 20px;
        }

        .input-box {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .input-field {
            width: 100%;
            padding: 1rem 1.2rem;
            border: 2px solid var(--border-light);
            border-radius: 12px;
            font-size: 1.1rem;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .input-field:focus {
            border-color: var(--primary-green);
        }

        .input-field.correct {
            border-color: var(--success-color);
            background-color: #dcfce7;
        }

        .input-field.incorrect {
            border-color: var(--error-color);
            background-color: #fee2e2;
        }

        .btn-check {
            background-color: var(--primary-green);
            color: white;
            border: none;
            padding: 0.9rem 1.5rem;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .btn-check:hover:not(:disabled) {
            background-color: var(--primary-green-hover);
        }

        .btn-check:disabled {
            background-color: var(--border-light);
            cursor: not-allowed;
        }

        /* Sekcja Dialogów z Lukami */
        .dialog-container {
            background-color: #f1f5f9;
            padding: 1.5rem;
            border-radius: 14px;
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
            line-height: 2;
        }

        .dialog-select {
            padding: 0.4rem 0.8rem;
            border: 2px solid var(--border-light);
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            background-color: #fff;
            outline: none;
            cursor: pointer;
            color: var(--text-dark);
        }

        .dialog-select:focus {
            border-color: var(--primary-green);
        }

        .word-bank {
            background-color: var(--primary-green-light);
            border: 2px dashed var(--primary-green);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
            color: var(--text-dark);
        }

        .word-bank span {
            display: inline-block;
            background-color: #fff;
            padding: 0.2rem 0.6rem;
            margin: 0.2rem;
            border-radius: 6px;
            border: 1px solid var(--border-light);
            font-weight: 700;
        }

        .feedback-msg {
            font-weight: 700;
            font-size: 0.95rem;
            margin-top: 0.5rem;
        }

        .feedback-msg.correct { color: var(--success-color); }
        .feedback-msg.incorrect { color: var(--error-color); }

        .nav-controls {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .prev-btn {
            flex: 1;
            background-color: #ffffff;
            color: var(--text-dark);
            border: 2px solid var(--border-light);
            padding: 0.9rem;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .prev-btn:hover:not(:disabled) {
            border-color: var(--text-muted);
            background-color: #f1f5f9;
        }

        .prev-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .next-btn {
            flex: 2;
            background-color: var(--primary-green);
            color: white;
            border: none;
            padding: 0.9rem;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .next-btn:hover:not(:disabled) {
            background-color: var(--primary-green-hover);
        }

        .next-btn:disabled {
            background-color: var(--border-light);
            cursor: not-allowed;
        }

        .completion-screen {
            text-align: center;
            padding: 3rem 1.5rem;
            display: none;
            background: #fff;
            border-radius: 20px;
            box-shadow: var(--shadow-soft);
            border: 2px solid var(--border-light);
        }

        .score-badge {
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--primary-green);
            margin-bottom: 0.2rem;
        }

        .score-percent {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }

        .btn-action-group {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-top: 2rem;
            align-items: center;
        }

        .btn-restart {
            background-color: #ffffff;
            color: var(--text-dark);
            border: 2px solid var(--border-light);
            padding: 0.9rem 2rem;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s ease;
            width: 100%;
            max-width: 300px;
        }

        .btn-restart:hover {
            border-color: var(--primary-green);
            color: var(--primary-green);
        }

        .btn-finish {
            display: inline-block;
            background-color: var(--primary-green);
            color: white;
            text-decoration: none;
            padding: 0.9rem 2rem;
            border-radius: 30px;
            font-weight: 700;
            width: 100%;
            max-width: 300px;
            text-align: center;
        }

        .btn-finish:hover {
            background-color: var(--primary-green-hover);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <a href="module-2-vocab.html" class="back-link">← Powrót do modułu</a>
            <span id="step-counter" style="font-weight: 700; color: var(--text-muted);">Pytanie 1 / 20</span>
        </div>

        <div class="progress-bar-container">
            <div class="progress-fill" id="progress-bar"></div>
        </div>

        <!-- Karta Pytania -->
        <div class="quiz-card" id="quiz-card">
            <div class="question-title" id="question-title"></div>
            <div id="quiz-content"></div>
            <div id="input-feedback" class="feedback-msg"></div>

            <div class="nav-controls">
                <button class="prev-btn" id="prev-btn" onclick="prevQuestion()">← Wstecz</button>
                <button class="next-btn" id="next-btn" onclick="nextQuestion()">Następne pytanie (Enter) →</button>
            </div>
        </div>

        <!-- Ekran Końcowy -->
        <div class="completion-screen" id="completion-screen">
            <h2>🎉 Test Ukończony!</h2>
            <div class="score-badge" id="final-score">0 / 20</div>
            <div class="score-percent" id="final-percent">0%</div>
            <p id="completion-desc">Świetna robota! Sprawdź swój wynik końcowy poniżej.</p>

            <div class="btn-action-group">
                <button class="btn-restart" onclick="restartQuiz()">🔄 Powtórz test</button>
                <a href="module-2-vocab.html" class="btn-finish" onclick="markStageComplete()">Przejdź do Modułu 2</a>
            </div>
        </div>
    </div>

    <script>
        const testQuestions = [
            {
                type: "checkbox",
                title: "1. Owoce to:",
                options: ["Jabłko", "Chleb", "Truskawka", "Ser", "Banan", "Pomidor"],
                correctIndices: [0, 2, 4]
            },
            {
                type: "text",
                title: "2. „Apple pie” po polsku to?",
                correct: "szarlotka"
            },
            {
                type: "radio",
                title: "3. Poproszę ...",
                options: ["zimna woda", "zimniej wody", "zimną wodę"],
                correctIndex: 2
            },
            {
                type: "radio",
                title: "4. Sery, mleko i masło muszę spakować do ________.",
                options: ["torby", "torba", "torbą"],
                correctIndex: 0
            },
            {
                type: "checkbox",
                title: "5. Co pijemy rano ze śniadaniem?",
                options: ["Sok", "Woda", "Kawa"],
                correctIndices: [0, 1, 2]
            },
            {
                type: "text",
                title: "6. Gdzie parkujemy samochód? (Wpisz słowo w odpowiedniej formie: do...)",
                correct: "garażu"
            },
            {
                type: "radio",
                title: "7. Dopasowanie: W którym pomieszczeniu śpimy?",
                options: ["Kuchnia", "Sypialnia", "Łazienka"],
                correctIndex: 1
            },
            {
                type: "dialog",
                title: "8. Dialog w kuchni: Uzupełnij luki w zdaniach.",
                wordBank: ["lodówka", "lodówki", "obiad", "obiadu", "kuchnia"],
                text: "– Gdzie jest mleko?<br>– Mleko jest w {0}. Zaraz zrobimy pyszny {1}!",
                correctAnswers: ["lodówce", "obiad"],
                options: [
                    ["lodówce", "lodówka", "lodówki"],
                    ["obiad", "obiadu", "obiadem"]
                ]
            },
            {
                type: "radio",
                title: "9. Wybierz poprawną odmianę: Mieszkam w dużym ________.",
                options: ["domu", "dom", "domem"],
                correctIndex: 0
            },
            {
                type: "text",
                title: "10. Przetłumacz słowo „Living room” na język polski:",
                correct: "salon"
            },
            {
                type: "checkbox",
                title: "11. Zaznacz meble znajdujące się w pokoju:",
                options: ["Kanapa", "Piekarnik", "Szafa", "Wanna", "Stół"],
                correctIndices: [0, 2, 4]
            },
            {
                type: "radio",
                title: "12. Tłumaczenie: Jak powiesz po polsku „Garden”?",
                options: ["Garaż", "Ogród", "Balkon"],
                correctIndex: 1
            },
            {
                type: "text",
                title: "13. Odmiana: Chcę kupić nową ________ (kanapa). Wpisz w poprawnej formie:",
                correct: "kanapę"
            },
            {
                type: "radio",
                title: "14. Gdzie myjemy zęby i bierzemy prysznic?",
                options: ["W łazience", "W kuchni", "W piwnicy"],
                correctIndex: 0
            },
            {
                type: "dialog",
                title: "15. Dialog w mieszkaniu: Uzupełnij wypowiedź.",
                wordBank: ["mieszkanie", "mieszkania", "balkon", "balkonu"],
                text: "– Czy twoje {0} jest duże?<br>– Tak, i mam piękny {1} z widokiem na park.",
                correctAnswers: ["mieszkanie", "balkon"],
                options: [
                    ["mieszkanie", "mieszkania", "mieszkaniu"],
                    ["balkon", "balkonu", "balkonie"]
                ]
            },
            {
                type: "text",
                title: "16. Gdzie przechowujemy lody i mrożonki? Wpisz słowo:",
                correct: "zamrażarka"
            },
            {
                type: "radio",
                title: "17. Wybierz poprawną formę: Na stole stoi gorąca ________.",
                options: ["zupa", "zupę", "zupy"],
                correctIndex: 0
            },
            {
                type: "checkbox",
                title: "18. Wybierz produkty, które trzymamy w lodówce:",
                options: ["Masło", "Chleb", "Jogurt", "Mleko"],
                correctIndices: [0, 2, 3]
            },
            {
                type: "text",
                title: "19. Odmiana: Przetłumacz i wpisz w odpowiedniej formie: On siedzi na ________ (chair).",
                correct: "krześle"
            },
            {
                type: "radio",
                title: "20. Co robimy w jadalni?",
                options: ["Jemy posiłki", "Grajmy w piłkę", "Myjemy auto"],
                correctIndex: 0
            }
        ];

        let currentIndex = 0;
        let attempts = 0;
        let userAnswers = new Array(testQuestions.length).fill(null);

        function renderQuestion() {
            const q = testQuestions[currentIndex];
            document.getElementById('question-title').textContent = q.title;
            const container = document.getElementById('quiz-content');
            const feedback = document.getElementById('input-feedback');
            const prevBtn = document.getElementById('prev-btn');

            feedback.textContent = '';
            container.innerHTML = '';
            prevBtn.disabled = (currentIndex === 0);

            const saved = userAnswers[currentIndex];

            if (q.type === 'text') {
                const box = document.createElement('div');
                box.className = 'input-box';

                const input = document.createElement('input');
                input.type = 'text';
                input.id = 'user-input';
                input.className = 'input-field';
                input.placeholder = 'Wpisz odpowiedź...';
                input.autocomplete = 'off';

                const btn = document.createElement('button');
                btn.className = 'btn-check';
                btn.id = 'btn-submit';
                btn.textContent = 'Sprawdź odpowiedź';
                btn.onclick = checkTextAnswer;

                box.appendChild(input);
                box.appendChild(btn);
                container.appendChild(box);

                if (saved && saved.completed) {
                    input.value = saved.val;
                    input.disabled = true;
                    btn.disabled = true;
                    if (saved.isCorrect) {
                        input.className = 'input-field correct';
                        feedback.textContent = '✨ Poprawnie!';
                        feedback.className = 'feedback-msg correct';
                    } else {
                        input.className = 'input-field incorrect';
                        feedback.textContent = `❌ Prawidłowa odpowiedź: "${q.correct}"`;
                        feedback.className = 'feedback-msg incorrect';
                    }
                    enableNextButton(true);
                } else {
                    attempts = 0;
                    enableNextButton(false);
                    setTimeout(() => input.focus(), 50);
                }
            } else if (q.type === 'radio') {
                const list = document.createElement('div');
                list.className = 'options-container';

                q.options.forEach((opt, idx) => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.textContent = opt;

                    if (saved && saved.completed) {
                        btn.disabled = true;
                        if (idx === q.correctIndex) {
                            btn.className = 'option-btn correct';
                        } else if (saved.selected === idx) {
                            btn.className = 'option-btn incorrect';
                        }
                    } else {
                        btn.onclick = () => selectRadioAnswer(idx);
                    }

                    list.appendChild(btn);
                });

                container.appendChild(list);

                if (saved && saved.completed) {
                    feedback.textContent = saved.isCorrect ? '✨ Poprawnie!' : `❌ Prawidłowa odpowiedź: ${q.options[q.correctIndex]}`;
                    feedback.className = `feedback-msg ${saved.isCorrect ? 'correct' : 'incorrect'}`;
                    enableNextButton(true);
                } else {
                    enableNextButton(false);
                }
            } else if (q.type === 'checkbox') {
                const grid = document.createElement('div');
                grid.className = 'checkbox-grid';

                q.options.forEach((opt, idx) => {
                    const label = document.createElement('label');
                    label.className = 'checkbox-item';

                    const chk = document.createElement('input');
                    chk.type = 'checkbox';
                    chk.value = idx;

                    if (saved && saved.completed) {
                        chk.disabled = true;
                        chk.checked = saved.selected.includes(idx);
                        if (q.correctIndices.includes(idx)) {
                            label.style.borderColor = 'var(--success-color)';
                            label.style.backgroundColor = '#dcfce7';
                        } else if (saved.selected.includes(idx)) {
                            label.style.borderColor = 'var(--error-color)';
                            label.style.backgroundColor = '#fee2e2';
                        }
                    } else {
                        chk.onchange = () => {
                            if (chk.checked) label.classList.add('selected');
                            else label.classList.remove('selected');
                        };
                    }

                    label.appendChild(chk);
                    label.appendChild(document.createTextNode(opt));
                    grid.appendChild(label);
                });

                container.appendChild(grid);

                if (!saved || !saved.completed) {
                    const btn = document.createElement('button');
                    btn.className = 'btn-check';
                    btn.style.width = '100%';
                    btn.textContent = 'Sprawdź wybrane';
                    btn.onclick = checkCheckboxAnswer;
                    container.appendChild(btn);
                    enableNextButton(false);
                } else {
                    feedback.textContent = saved.isCorrect ? '✨ Wszystkie poprawne zaznaczone!' : '❌ Niezupełnie dobrze.';
                    feedback.className = `feedback-msg ${saved.isCorrect ? 'correct' : 'incorrect'}`;
                    enableNextButton(true);
                }
            } else if (q.type === 'dialog') {
                const bank = document.createElement('div');
                bank.className = 'word-bank';
                bank.innerHTML = '<strong>Bank słów do wyboru:</strong><br>' + q.wordBank.map(w => `<span>${w}</span>`).join(' ');
                container.appendChild(bank);

                const dialogBox = document.createElement('div');
                dialogBox.className = 'dialog-container';

                let formattedText = q.text;
                q.options.forEach((opts, slotIdx) => {
                    let selectHTML = `<select class="dialog-select" id="slot-${slotIdx}" ${saved && saved.completed ? 'disabled' : ''}>`;
                    selectHTML += `<option value="">--wybierz--</option>`;
                    opts.forEach(opt => {
                        selectHTML += `<option value="${opt}">${opt}</option>`;
                    });
                    selectHTML += `</select>`;
                    formattedText = formattedText.replace(`{${slotIdx}}`, selectHTML);
                });

                dialogBox.innerHTML = formattedText;
                container.appendChild(dialogBox);

                if (!saved || !saved.completed) {
                    const btn = document.createElement('button');
                    btn.className = 'btn-check';
                    btn.style.width = '100%';
                    btn.textContent = 'Sprawdź dialog';
                    btn.onclick = checkDialogAnswer;
                    container.appendChild(btn);
                    enableNextButton(false);
                } else {
                    q.options.forEach((_, slotIdx) => {
                        const sel = document.getElementById(`slot-${slotIdx}`);
                        sel.value = saved.selected[slotIdx] || '';
                    });
                    feedback.textContent = saved.isCorrect ? '✨ Świetnie! Dialog skompletowany.' : `❌ Prawidłowe słowa: ${q.correctAnswers.join(', ')}`;
                    feedback.className = `feedback-msg ${saved.isCorrect ? 'correct' : 'incorrect'}`;
                    enableNextButton(true);
                }
            }

            updateProgress();
        }

        function checkTextAnswer() {
            const q = testQuestions[currentIndex];
            const input = document.getElementById('user-input');
            const btn = document.getElementById('btn-submit');
            const feedback = document.getElementById('input-feedback');

            const val = input.value.trim().toLowerCase();
            const correctVal = q.correct.toLowerCase();

            if (!val) return;

            if (val === correctVal) {
                input.className = 'input-field correct';
                input.disabled = true;
                btn.disabled = true;
                feedback.textContent = '✨ Poprawnie!';
                feedback.className = 'feedback-msg correct';

                userAnswers[currentIndex] = { completed: true, isCorrect: true, val: input.value };
                enableNextButton(true);
            } else {
                attempts++;
                input.className = 'input-field incorrect';

                if (attempts < 3) {
                    feedback.textContent = `❌ Niepoprawnie (Próba ${attempts}/3). Spróbuj ponownie!`;
                    feedback.className = 'feedback-msg incorrect';
                } else {
                    input.value = q.correct;
                    input.disabled = true;
                    btn.disabled = true;
                    feedback.textContent = `❌ Brak prób. Prawidłowa odpowiedź to: "${q.correct}"`;
                    feedback.className = 'feedback-msg incorrect';

                    // Brak punktu po 3 nieudanych próbach
                    userAnswers[currentIndex] = { completed: true, isCorrect: false, val: q.correct };
                    enableNextButton(true);
                }
            }
        }

        function selectRadioAnswer(idx) {
            const q = testQuestions[currentIndex];
            const isCorrect = (idx === q.correctIndex);
            userAnswers[currentIndex] = { completed: true, isCorrect: isCorrect, selected: idx };
            renderQuestion();
        }

        function checkCheckboxAnswer() {
            const q = testQuestions[currentIndex];
            const checkedInputs = Array.from(document.querySelectorAll('.checkbox-grid input:checked')).map(i => parseInt(i.value));

            const isCorrect = q.correctIndices.length === checkedInputs.length &&
                q.correctIndices.every(val => checkedInputs.includes(val));

            userAnswers[currentIndex] = { completed: true, isCorrect: isCorrect, selected: checkedInputs };
            renderQuestion();
        }

        function checkDialogAnswer() {
            const q = testQuestions[currentIndex];
            const selectedValues = [];
            let allSelected = true;

            q.options.forEach((_, slotIdx) => {
                const val = document.getElementById(`slot-${slotIdx}`).value;
                if (!val) allSelected = false;
                selectedValues.push(val);
            });

            if (!allSelected) return;

            const isCorrect = selectedValues.every((val, idx) => val === q.correctAnswers[idx]);

            userAnswers[currentIndex] = { completed: true, isCorrect: isCorrect, selected: selectedValues };
            renderQuestion();
        }

        function enableNextButton(enable) {
            document.getElementById('next-btn').disabled = !enable;
        }

        function nextQuestion() {
            if (currentIndex < testQuestions.length - 1) {
                currentIndex++;
                renderQuestion();
            } else {
                showCompletion();
            }
        }

        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            }
        }

        function updateProgress() {
            const total = testQuestions.length;
            const pct = ((currentIndex + 1) / total) * 100;
            document.getElementById('progress-bar').style.width = `${pct}%`;
            document.getElementById('step-counter').textContent = `Pytanie ${currentIndex + 1} / ${total}`;
        }

        function calculateScore() {
            let total = 0;
            userAnswers.forEach(ans => {
                if (ans && ans.isCorrect) total++;
            });
            return total;
        }

        function showCompletion() {
            document.getElementById('quiz-card').style.display = 'none';
            document.getElementById('completion-screen').style.display = 'block';
            document.getElementById('progress-bar').style.width = '100%';

            const score = calculateScore();
            const total = testQuestions.length;
            const percent = Math.round((score / total) * 100);

            document.getElementById('final-score').textContent = `${score} / ${total}`;
            document.getElementById('final-percent').textContent = `${percent}%`;
        }

        function restartQuiz() {
            currentIndex = 0;
            userAnswers = new Array(testQuestions.length).fill(null);
            document.getElementById('completion-screen').style.display = 'none';
            document.getElementById('quiz-card').style.display = 'block';
            renderQuestion();
        }

        function markStageComplete() {
            const MODULE_KEY = 'm1_progress';
            let progress = JSON.parse(localStorage.getItem(MODULE_KEY)) || {};
            progress.test = true;
            localStorage.setItem(MODULE_KEY, JSON.stringify(progress));
        }

        document.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
                const saved = userAnswers[currentIndex];
                if (saved && saved.completed) {
                    const nextBtn = document.getElementById('next-btn');
                    if (!nextBtn.disabled) {
                        nextQuestion();
                    }
                } else if (testQuestions[currentIndex].type === 'text') {
                    checkTextAnswer();
                }
            }
        });

        renderQuestion();
    </script>
</body>
</html>
