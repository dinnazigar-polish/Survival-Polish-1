<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moduł 3 – Etap 7: Test Końcowy</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary-green: #2ecc71;
            --primary-green-hover: #27ae60;
            --badge-green-bg: #e8f8f0;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-dark: #2c3e50;
            --text-muted: #7f8c8d;
            --border-light: #e2e8f0;
            --shadow-soft: 0 10px 30px rgba(0, 0, 0, 0.08);
            --error-red: #e74c3c;
            --error-bg: #fadbd8;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-dark);
            line-height: 1.6;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        /* Top Navigation */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: color 0.2s ease;
        }

        .back-link:hover {
            color: var(--primary-green);
        }

        .counter-badge {
            background-color: var(--badge-green-bg);
            color: var(--primary-green);
            font-weight: 700;
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.95rem;
        }

        /* Progress Bar */
        .progress-track {
            width: 100%;
            height: 10px;
            background-color: var(--border-light);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 2rem;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--primary-green);
            width: 0%;
            transition: width 0.3s ease;
        }

        /* Question Card */
        .test-card {
            background-color: var(--card-bg);
            border-radius: 24px;
            padding: 2.5rem 2rem;
            box-shadow: var(--shadow-soft);
            border: 2px solid var(--border-light);
            margin-bottom: 1.5rem;
        }

        .question-category {
            display: inline-block;
            background-color: var(--badge-green-bg);
            color: var(--primary-green);
            font-size: 0.85rem;
            font-weight: 700;
            padding: 0.3rem 0.8rem;
            border-radius: 12px;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }

        .question-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 1.5rem;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .option-btn {
            background-color: var(--card-bg);
            border: 2px solid var(--border-light);
            border-radius: 16px;
            padding: 1rem 1.2rem;
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text-dark);
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--primary-green);
            background-color: var(--badge-green-bg);
        }

        .option-btn.selected {
            border-color: var(--primary-green);
            background-color: var(--badge-green-bg);
            color: var(--primary-green);
            font-weight: 700;
        }

        .btn {
            background-color: var(--primary-green);
            color: #ffffff;
            font-weight: 700;
            font-size: 1rem;
            padding: 0.9rem 2.2rem;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s ease;
            width: 100%;
            margin-top: 1.5rem;
        }

        .btn:hover {
            background-color: var(--primary-green-hover);
        }

        /* Results Screen */
        .result-screen {
            display: none;
            background-color: var(--card-bg);
            border-radius: 24px;
            padding: 3rem 2rem;
            text-align: center;
            box-shadow: var(--shadow-soft);
            border: 2px solid var(--border-light);
        }

        .stars-container {
            font-size: 3rem;
            margin-bottom: 1rem;
            letter-spacing: 0.5rem;
        }

        .score-circle {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background-color: var(--badge-green-bg);
            color: var(--primary-green);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            font-weight: 800;
            margin: 1.5rem auto;
            border: 4px solid var(--primary-green);
        }

        .result-screen h2 {
            font-size: 2rem;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }

        .result-screen p {
            color: var(--text-muted);
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Navigation Header -->
        <div class="top-nav">
            <a href="module3.html" class="back-link">
                ← Powrót do Modułu 3
            </a>
            <span class="counter-badge" id="question-counter">Pytanie 1 / 30</span>
        </div>

        <!-- Progress Bar -->
        <div class="progress-track">
            <div class="progress-fill" id="progress-bar"></div>
        </div>

        <!-- Test Question Area -->
        <div id="test-container">
            <div class="test-card">
                <span class="question-category" id="q-category">Słownictwo</span>
                <div class="question-title" id="q-title">Co oznacza "paragon"?</div>
                <div class="options-list" id="options-container"></div>
                <button class="btn" id="next-btn" onclick="nextQuestion()" disabled>Dalej →</button>
            </div>
        </div>

        <!-- Results Screen -->
        <div class="result-screen" id="result-screen">
            <div class="stars-container" id="stars-display">⭐⭐⭐</div>
            <h2 id="result-title">Koniec Testu!</h2>
            <div class="score-circle" id="score-circle">100%</div>
            <p id="result-text">Doskonały wynik! Ukończyłeś cały Moduł 3 z zakupy z listą!</p>
            <a href="module3.html" class="btn">Powrót do menu modułu</a>
        </div>
    </div>

    <script>
        const testQuestions = [
            // Vocabulary (10)
            { category: "Słownictwo", q: "Co to jest 'paragon'?", opts: ["Dowód zakupu ze sklepu", "Karta do płacenia", "Miejsce na parking"], correct: 0 },
            { category: "Słownictwo", q: "Co oznacza słowo 'gotówka'?", opts: ["Pieniądze papierowe / monety", "Płatność telefonem", "Bilet na autobus"], correct: 0 },
            { category: "Słownictwo", q: "Gdzie kupisz świeży chleb i bułki?", opts: ["W sklepie / piekarni", "W parkometrze", "W tramwaju"], correct: 0 },
            { category: "Słownictwo", q: "Co jest potrzebne do mycia włosów?", opts: ["Szampon", "Mydło", "Sałata"], correct: 0 },
            { category: "Słownictwo", q: "Gdzie płacimy za zakupy?", opts: ["Przy kasie", "W wózku", "W parkometrze"], correct: 0 },
            { category: "Słownictwo", q: "Co wkładamy do parkometru?", opts: ["Monety / gotówkę lub kartę", "Jajka", "Mydło"], correct: 0 },
            { category: "Słownictwo", q: "Czym jeździmy po mieście?", opts: ["Autobusem i tramwajem", "Torba", "Dużym wózkiem"], correct: 0 },
            { category: "Słownictwo", q: "Co jest słodkim deserem na urodziny?", opts: ["Tort", "Ogórek", "Sałata"], correct: 0 },
            { category: "Słownictwo", q: "Co służy do noszenia zakupów ze sklepu?", opts: ["Torba", "Mydło", "Bilet parkingowy"], correct: 0 },
            { category: "Słownictwo", q: "Co dzieci lubią układać?", opts: ["Klocki", "Paragon", "Szampon"], correct: 0 },

            // Grammar (10)
            { category: "Gramatyka", q: "Poprawna forma: Kupuję ______ (sałata).", opts: ["sałatę", "sałata", "sałatą"], correct: 0 },
            { category: "Gramatyka", q: "Poprawna forma: Proszę świeży ______ (chleb).", opts: ["chleb", "chleba", "chlebem"], correct: 0 },
            { category: "Gramatyka", q: "Poprawna forma: Płacę ______ (karta płatnicza).", opts: ["kartą płatniczą", "kartę płatniczą", "karta płatnicza"], correct: 0 },
            { category: "Gramatyka", q: "Poprawna forma: Jadę do sklepu ______ (autobus).", opts: ["autobusem", "autobus", "autobusu"], correct: 0 },
            { category: "Gramatyka", q: "Poprawna forma: Lubię ______ (robić zakupy).", opts: ["robić zakupy", "robisz zakupy", "robimy zakupy"], correct: 0 },
            { category: "Gramatyka", q: "Poprawna forma: Masz ______ (duży wózek)?", opts: ["duży wózek", "dużym wózkiem", "dużego wózka"], correct: 0 },
            { category: "Gramatyka", q: "Poprawna forma: Płacę ______ (gotówka).", opts: ["gotówką", "gotówkę", "gotówka"], correct: 0 },
            { category: "Gramatyka", q: "Poprawna forma: Chcę ______ (pomagać).", opts: ["pomagać", "pomagam", "pomaga"], correct: 0 },
            { category: "Gramatyka", q: "Poprawna forma: Kupuję sześć ______ (jajka).", opts: ["jajek", "jajka", "jajkiem"], correct: 0 },
            { category: "Gramatyka", q: "Poprawna forma: Potrzebuję ______ (bilet parkingowy).", opts: ["bilet parkingowy", "biletem parkingowym", "bilety parkingowe"], correct: 0 },

            // Dialogues & Practice (10)
            { category: "Dialogi", q: "Co mówimy na wejście do sklepu?", opts: ["Dzień dobry!", "Do widzenia!", "Ile to kosztuje?"], correct: 0 },
            { category: "Dialogi", q: "Pytanie: 'Płatność kartą czy gotówką?' Odpowiedź:", opts: ["Kartą, proszę.", "Dziękuję, nie mam.", "To jest parking."], correct: 0 },
            { category: "Dialogi", q: "Pytanie: 'Czy potrzebuje Pan paragon?' Odpowiedź:", opts: ["Tak, proszę.", "Nie, to jest sok.", "Jadę tramwajem."], correct: 0 },
            { category: "Dialogi", q: "Pytanie: 'W czym mogę pomóc?' Odpowiedź:", opts: ["Szukam świeżego sera i chleba.", "Mam bilet parkingowy.", "Zapłacę w parkometrze."], correct: 0 },
            { category: "Dialogi", q: "Co robimy przed wyjazdem z płatnego parkingu?", opts: ["Płacimy w parkometrze za bilet", "Kupujemy sałatę", "Szukamy wózka"], correct: 0 },
            { category: "Dialogi", q: "Kiedy mówimy 'Przepraszam, ile to kosztuje?'", opts: ["Gdy chcemy poznać cenę produktu", "Gdy wychodzimy z autobusu", "Gdy kupujemy klocki"], correct: 0 },
            { category: "Dialogi", q: "Gdzie wkładamy zakupy podczas chodzenia po sklepie?", opts: ["Do wózka lub koszyka", "Do parkometru", "Do autobusu"], correct: 0 },
            { category: "Dialogi", q: "Co odpowie ekspedient na 'Dziękuję'?", opts: ["Proszę bardzo! / Miłego dnia!", "Nie mam gotówki.", "To jest kloczek."], correct: 0 },
            { category: "Dialogi", q: "Gdzie kupujemy bilet na tramwaj lub autobus?", opts: ["W biletomacie lub przez aplikację", "W kasie w sklepie mięsnym", "U parkometru"], correct: 0 },
            { category: "Dialogi", q: "Co dajemy jubilatowi na urodziny?", opts: ["Prezent i tort", "Mydło i szampon", "Bilet parkingowy"], correct: 0 }
        ];

        let currentIdx = 0;
        let selectedOption = null;
        let userAnswers = [];

        function loadQuestion() {
            selectedOption = null;
            document.getElementById('next-btn').disabled = true;

            const item = testQuestions[currentIdx];

            document.getElementById('question-counter').textContent = `Pytanie ${currentIdx + 1} / ${testQuestions.length}`;
            document.getElementById('progress-bar').style.width = `${(currentIdx / testQuestions.length) * 100}%`;

            document.getElementById('q-category').textContent = item.category;
            document.getElementById('q-title').textContent = item.q;

            const optsContainer = document.getElementById('options-container');
            optsContainer.innerHTML = '';

            item.opts.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt;
                btn.onclick = () => selectOption(idx, btn);
                optsContainer.appendChild(btn);
            });
        }

        function selectOption(idx, btn) {
            selectedOption = idx;
            document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            document.getElementById('next-btn').disabled = false;
        }

        function nextQuestion() {
            if (selectedOption === null) return;

            userAnswers.push(selectedOption);
            currentIdx++;

            if (currentIdx < testQuestions.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            let correctCount = 0;
            testQuestions.forEach((q, idx) => {
                if (userAnswers[idx] === q.correct) {
                    correctCount++;
                }
            });

            const scorePercent = Math.round((correctCount / testQuestions.length) * 100);

            document.getElementById('test-container').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            document.getElementById('progress-bar').style.width = '100%';

            document.getElementById('score-circle').textContent = `${scorePercent}%`;

            const starsDisplay = document.getElementById('stars-display');
            const resultTitle = document.getElementById('result-title');
            const resultText = document.getElementById('result-text');

            if (scorePercent >= 80) {
                // Pass
                completeStage();
                if (typeof confetti === 'function') {
                    confetti({ particleCount: 120, spread: 70, origin: { y: 0.6 } });
                }

                if (scorePercent === 100) {
                    starsDisplay.textContent = '⭐⭐⭐';
                    resultTitle.textContent = 'Mistrzowski Wynik!';
                    resultText.textContent = 'Bezbłędny test! Twój polski na zakupach jest perfekcyjny!';
                } else {
                    starsDisplay.textContent = '⭐⭐';
                    resultTitle.textContent = 'Świetny Wynik!';
                    resultText.textContent = `Zdobyłeś ${scorePercent}%. Moduł 3 został oficjalnie zaliczony!`;
                }
            } else {
                // Fail
                starsDisplay.textContent = '⭐';
                resultTitle.textContent = 'Spróbuj Ponownie!';
                resultText.textContent = `Twój wynik to ${scorePercent}%. Do zaliczenia modułu potrzebujesz co najmniej 80%.`;
            }
        }

        function completeStage() {
            const MODULE_KEY = 'm3_progress';
            let progress = { stage1: true, stage2: true, stage3: true, stage4: true, stage5: true, stage6: true, stage7: false };
            
            const saved = localStorage.getItem(MODULE_KEY);
            if (saved) {
                try { progress = JSON.parse(saved); } catch(e) {}
            }

            progress.stage7 = true;
            localStorage.setItem(MODULE_KEY, JSON.stringify(progress));
        }

        // Initialize test
        loadQuestion();
    </script>
</body>
</html>
