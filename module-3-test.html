<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dialogi w Sklepie – Uzupełnij Luki</title>
    <style>
        :root {
            --primary-green: #2ecc71;
            --primary-green-hover: #27ae60;
            --badge-green-bg: #e8f8f0;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-dark: #2c3e50;
            --text-muted: #7f8c8d;
            --border-light: #e2e8f0;
            --shadow-soft: 0 10px 30px rgba(0, 0, 0, 0.08);
            --error-red: #e74c3c;
            --error-bg: #fadbd8;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-dark);
            line-height: 1.6;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 750px;
            margin: 0 auto;
        }

        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
        }

        .back-link:hover {
            color: var(--primary-green);
        }

        .counter-badge {
            background-color: var(--badge-green-bg);
            color: var(--primary-green);
            font-weight: 700;
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.95rem;
        }

        .header-title-box {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header-title-box h1 {
            font-size: 2rem;
            color: var(--text-dark);
            margin-bottom: 0.3rem;
        }

        .header-title-box p {
            color: var(--text-muted);
            font-size: 1rem;
        }

        .progress-track {
            width: 100%;
            height: 10px;
            background-color: var(--border-light);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 2rem;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--primary-green);
            width: 0%;
            transition: width 0.3s ease;
        }

        .exercise-card {
            background-color: var(--card-bg);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: var(--shadow-soft);
            border: 2px solid var(--border-light);
            margin-bottom: 1.5rem;
        }

        .exercise-header {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--border-light);
        }

        .exercise-header .icon {
            font-size: 2.2rem;
        }

        .exercise-header h3 {
            font-size: 1.25rem;
            color: var(--text-dark);
        }

        .text-box {
            background-color: #f1f5f9;
            border-radius: 16px;
            padding: 1.5rem;
            font-size: 1.1rem;
            line-height: 2;
            margin-bottom: 1.5rem;
            color: var(--text-dark);
            white-space: pre-line;
        }

        .drop-target {
            display: inline-block;
            min-width: 110px;
            height: 34px;
            padding: 0 0.6rem;
            margin: 0 0.2rem;
            border: 2px dashed var(--primary-green);
            border-radius: 8px;
            background-color: #ffffff;
            text-align: center;
            font-weight: 700;
            color: var(--primary-green-hover);
            vertical-align: middle;
            line-height: 30px;
        }

        .drop-target.filled {
            border-style: solid;
            background-color: var(--badge-green-bg);
        }

        .word-bank-box {
            background-color: var(--badge-green-bg);
            border-radius: 16px;
            padding: 1.2rem;
            border: 2px solid var(--border-light);
            margin-bottom: 1.5rem;
        }

        .word-bank-title {
            font-weight: 700;
            color: var(--primary-green-hover);
            margin-bottom: 0.8rem;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .words-flex {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
        }

        .word-chip {
            background-color: var(--card-bg);
            border: 2px solid var(--border-light);
            border-radius: 20px;
            padding: 0.5rem 1rem;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-dark);
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }

        .word-chip:hover {
            border-color: var(--primary-green);
            background-color: #f0fdf4;
        }

        .word-chip.selected {
            opacity: 0.4;
            cursor: not-allowed;
            background-color: #e2e8f0;
        }

        .btn {
            background-color: var(--primary-green);
            color: #ffffff;
            font-weight: 700;
            font-size: 1rem;
            padding: 0.9rem 2.2rem;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s ease;
            width: 100%;
            margin-top: 0.5rem;
        }

        .btn:hover {
            background-color: var(--primary-green-hover);
        }

        .btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .feedback-message {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 12px;
            font-weight: 600;
            text-align: center;
            display: none;
        }

        .feedback-message.correct {
            background-color: var(--badge-green-bg);
            color: var(--primary-green-hover);
            border: 1px solid var(--primary-green);
        }

        .feedback-message.wrong {
            background-color: var(--error-bg);
            color: var(--error-red);
            border: 1px solid var(--error-red);
        }

        .completion-screen {
            display: none;
            text-align: center;
            background-color: var(--card-bg);
            border-radius: 24px;
            padding: 3rem 2rem;
            box-shadow: var(--shadow-soft);
            border: 2px solid var(--border-light);
        }

        .completion-screen h2 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 999;
        }
    </style>
</head>
<body>

    <canvas id="confetti-canvas"></canvas>

        let currentIdx = 0;
        let userAnswers = [null, null, null];

        function shuffle(array) {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function loadExercise() {
            const ex = exercisesData[currentIdx];
            userAnswers = [null, null, null];

            document.getElementById('question-counter').textContent = `Zadanie ${currentIdx + 1} / ${exercisesData.length}`;
            document.getElementById('progress-bar').style.width = `${((currentIdx) / exercisesData.length) * 100}%`;
            document.getElementById('card-emoji').textContent = ex.emoji;
            document.getElementById('card-title').textContent = ex.title;

            document.getElementById('text-template').innerHTML = ex.template;

            const targets = document.querySelectorAll('.drop-target');
            targets.forEach(target => {
                target.onclick = () => clearBlank(parseInt(target.dataset.blank));
            });

            const wordsContainer = document.getElementById('words-container');
            wordsContainer.innerHTML = '';
            
            const shuffledWords = shuffle(ex.words);
            shuffledWords.forEach(word => {
                const chip = document.createElement('div');
                chip.className = 'word-chip';
                chip.textContent = word;
                chip.onclick = () => selectWord(word, chip);
                wordsContainer.appendChild(chip);
            });

            document.getElementById('feedback').style.display = 'none';
            document.getElementById('check-btn').style.display = 'block';
            document.getElementById('check-btn').disabled = false;
            document.getElementById('next-btn').style.display = 'none';
        }

        function selectWord(word, chip) {
            if (chip.classList.contains('selected')) return;

            const emptyIdx = userAnswers.findIndex(ans => ans === null);
            if (emptyIdx !== -1) {
                userAnswers[emptyIdx] = { word: word, element: chip };
                chip.classList.add('selected');
                updateTargets();
            }
        }

        function clearBlank(blankIdx) {
            if (userAnswers[blankIdx]) {
                userAnswers[blankIdx].element.classList.remove('selected');
                userAnswers[blankIdx] = null;
                updateTargets();
            }
        }

        function updateTargets() {
            const targets = document.querySelectorAll('.drop-target');
            targets.forEach((target, idx) => {
                if (userAnswers[idx]) {
                    target.textContent = userAnswers[idx].word;
                    target.classList.add('filled');
                } else {
                    target.textContent = '';
                    target.classList.remove('filled');
                }
            });
        }

        function checkAnswers() {
            if (userAnswers.includes(null)) {
                alert('Uzupełnij wszystkie luki przed sprawdzeniem!');
                return;
            }

            const ex = exercisesData[currentIdx];
            let isCorrect = true;

            for (let i = 0; i < 3; i++) {
                if (userAnswers[i].word !== ex.correct[i]) {
                    isCorrect = false;
                    break;
                }
            }

            const feedback = document.getElementById('feedback');
            feedback.style.display = 'block';

            if (isCorrect) {
                feedback.className = 'feedback-message correct';
                feedback.textContent = 'Świetnie! Dialog został uzupełniony poprawnie!';
                document.getElementById('check-btn').style.display = 'none';
                document.getElementById('next-btn').style.display = 'block';
            } else {
                feedback.className = 'feedback-message wrong';
                feedback.textContent = 'Niektóre słowa są w złym miejscu. Spróbuj jeszcze raz!';
            }
        }

        function nextQuestion() {
            currentIdx++;
            if (currentIdx < exercisesData.length) {
                loadExercise();
            } else {
                finishAll();
            }
        }

        function finishAll() {
            document.getElementById('progress-bar').style.width = '100%';
            document.getElementById('exercise-container').style.display = 'none';
            document.getElementById('completion-screen').style.display = 'block';
            launchConfetti();
        }

        function launchConfetti() {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const particles = [];
            const colors = ['#2ecc71', '#3498db', '#f1c40f', '#e74c3c', '#9b59b6'];

            for (let i = 0; i < 80; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    size: Math.random() * 8 + 4,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    speedY: Math.random() * 3 + 2,
                    speedX: Math.random() * 2 - 1,
                    rotation: Math.random() * 360
                });
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => {
                    p.y += p.speedY;
                    p.x += p.speedX;
                    p.rotation += 2;

                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate((p.rotation * Math.PI) / 180);
                    ctx.fillStyle = p.color;
                    ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
                    ctx.restore();
                });

                if (particles.some(p => p.y < canvas.height)) {
                    requestAnimationFrame(animate);
                } else {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                }
            }
            animate();
        }

        loadExercise();
    </script>
</body>
</html>
