<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moduł 2 – Etap 5: Dialogi</title>
    <style>
        :root {
            --primary-salmon: #f49c96;
            --primary-salmon-hover: #e0857f;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-dark: #2c3e50;
            --text-muted: #7f8c8d;
            --border-light: #e2e8f0;
            --bubble-left: #f1f5f9;
            --bubble-right: #fdf0ef;
            --shadow-soft: 0 10px 30px rgba(0, 0, 0, 0.05);
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --success-color: #27ae60;
            --error-color: #e74c3c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-dark);
            line-height: 1.6;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .back-link {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
        }

        .back-link:hover {
            color: var(--primary-salmon);
        }

        .progress-bar-container {
            width: 100%;
            height: 10px;
            background-color: var(--border-light);
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 2rem;
        }

        .progress-bar-fill {
            height: 100%;
            background-color: var(--primary-salmon);
            width: 0%;
            transition: width 0.3s ease;
        }

        .dialogue-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: var(--shadow-soft);
            border: 2px solid var(--border-light);
            margin-bottom: 1.5rem;
        }

        .chat-window {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            min-height: 260px;
            margin-bottom: 2rem;
        }

        .chat-bubble {
            max-width: 80%;
            padding: 1rem 1.2rem;
            border-radius: 18px;
            font-size: 1.05rem;
            position: relative;
            animation: fadeIn 0.6s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .chat-bubble.speaker-a {
            align-self: flex-start;
            background-color: var(--bubble-left);
            color: var(--text-dark);
            border-bottom-left-radius: 4px;
        }

        .chat-bubble.speaker-b {
            align-self: flex-end;
            background-color: var(--bubble-right);
            color: var(--text-dark);
            border-bottom-right-radius: 4px;
            border: 1px solid var(--primary-salmon);
        }

        .speaker-name {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.2rem;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .option-btn {
            background-color: #ffffff;
            border: 2px solid var(--border-light);
            padding: 1rem 1.2rem;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-dark);
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--primary-salmon);
            background-color: #fffaf9;
        }

        .option-btn.correct {
            border-color: var(--success-color);
            background-color: #eafaf1;
            color: var(--success-color);
        }

        .option-btn.incorrect {
            border-color: var(--error-color);
            background-color: #fdf2f2;
            color: var(--error-color);
        }

        .option-btn:disabled {
            cursor: default;
        }

        .next-btn {
            margin-top: 1.5rem;
            width: 100%;
            background-color: var(--primary-salmon);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            display: none;
            transition: background-color 0.2s ease;
        }

        .next-btn:hover {
            background-color: var(--primary-salmon-hover);
        }

        /* Reading timer indicator */
        .timer-badge {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: center;
            margin-top: 0.5rem;
            font-style: italic;
        }

        .completion-screen {
            text-align: center;
            padding: 3rem 1rem;
            display: none;
        }

        .completion-screen h2 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .btn-finish {
            display: inline-block;
            background-color: var(--primary-salmon);
            color: white;
            text-decoration: none;
            padding: 0.9rem 2rem;
            border-radius: 30px;
            font-weight: 700;
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <a href="module-2-vocab.html" class="back-link">← Powrót do listy etapów</a>
            <span id="step-counter" style="font-weight: 700; color: var(--text-muted);">Dialog 1 / 6</span>
        </div>

        <div class="progress-bar-container">
            <div class="progress-fill" id="progress-bar"></div>
        </div>

        <!-- Główna karta dialogu -->
        <div class="dialogue-card" id="dialogue-card">
            <div class="chat-window" id="chat-window">
                <!-- Wiadomości będą generowane automatycznie -->
            </div>

            <div id="interaction-area">
                <p style="font-weight: 700; margin-bottom: 0.8rem; color: var(--text-dark);">Wybierz pasującą odpowiedź:</p>
                <div class="options-container" id="options-container">
                    <!-- Opcje do wyboru -->
                </div>
            </div>

            <button class="next-btn" id="next-btn" onclick="nextDialogue()">Kontynuuj →</button>
        </div>

        <!-- Ekran końcowy -->
        <div class="completion-screen" id="completion-screen">
            <h2>🎉 Świetnie!</h2>
            <p>Ukończyłeś Etap 5: Dialogi. Wszystkie rozmowy zostały opanowane!</p>
            <a href="module-2-vocab.html" class="btn-finish" onclick="markStageComplete()">Zapisz i wróć do modułu</a>
        </div>
    </div>

    <script>
        const dialogues = [
            {
                prompt: "Kto odbiera Wasze dzieci ze szkoły?",
                options: [
                    { text: "Moja żona po pracy jedzie po dzieci.", correct: true },
                    { text: "Moja mama jest nauczycielką w liceum.", correct: false }
                ],
                reaction: "Rozumiem, to bardzo wygodne rozwiązanie."
            },
            {
                prompt: "Czym zajmuje się Twoja mama?",
                options: [
                    { text: "Moja mama jest nauczycielką. Naucza matematyki i fizyki.", correct: true },
                    { text: "Moja mama piecze pyszne ciasta w cukierni.", correct: false }
                ],
                reaction: "Wow! Matematyka i fizyka są dla mnie bardzo trudne."
            },
            {
                prompt: "Kto Ciebie nauczył tak dobrze mówić po polsku?",
                options: [
                    { text: "Nasza babcia świetnie mówi po polsku. Urodziła się w Polsce.", correct: true },
                    { text: "Mój bratanek bardzo lubi uczyć się języków obcych.", correct: false }
                ],
                reaction: "To niesamowite! Masz wspaniałą rodzinną historię."
            },
            {
                prompt: "Kto upiekł ten pyszny tort?",
                options: [
                    { text: "Moja mama piecze pyszne ciasta. Ona pracuje w cukierni.", correct: true },
                    { text: "Mój tata codziennie gotuje obiad dla całej rodziny.", correct: false }
                ],
                reaction: "Naprawdę wyśmienity! Muszę poprosić o przepis."
            },
            {
                prompt: "Czy masz rodzeństwo?",
                options: [
                    { text: "Tak, mam starszego brata i młodszą siostrę.", correct: true },
                    { text: "Tak, moi rodzice są już na emeryturze.", correct: false }
                ],
                reaction: "Fajnie! Często się spotykacie?"
            },
            {
                prompt: "Jak wygląda Twój najlepszy przyjaciel?",
                options: [
                    { text: "Jest wysoki, ma krótkie ciemne włosy i nosi okulary.", correct: true },
                    { text: "Mój przyjaciel pracuje jako inżynier w dużej firmie.", correct: false }
                ],
                reaction: "Wydaje się bardzo sympatyczny!"
            }
        ];

        let currentIndex = 0;

        function renderDialogue() {
            const current = dialogues[currentIndex];
            const chatWindow = document.getElementById('chat-window');
            const optionsContainer = document.getElementById('options-container');
            const nextBtn = document.getElementById('next-btn');

            chatWindow.innerHTML = '';
            optionsContainer.innerHTML = '';
            nextBtn.style.display = 'none';

            // Pokaż pierwsze pytanie
            const bubbleA = document.createElement('div');
            bubbleA.className = 'chat-bubble speaker-a';
            bubbleA.innerHTML = `<div class="speaker-name">Rozmówca A</div>${current.prompt}`;
            chatWindow.appendChild(bubbleA);

            // Pomieszaj opcje
            const shuffledOptions = [...current.options].sort(() => Math.random() - 0.5);

            shuffledOptions.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt.text;
                btn.onclick = () => selectOption(btn, opt.correct, current.reaction);
                optionsContainer.appendChild(btn);
            });

            updateProgress();
        }

        function selectOption(selectedBtn, isCorrect, reactionText) {
            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach(btn => btn.disabled = true);

            if (isCorrect) {
                selectedBtn.classList.add('correct');

                // Wyświetl wybraną odpowiedź jako chmurkę rozmówcy B
                const chatWindow = document.getElementById('chat-window');
                const bubbleB = document.createElement('div');
                bubbleB.className = 'chat-bubble speaker-b';
                bubbleB.innerHTML = `<div class="speaker-name">Ty</div>${selectedBtn.textContent}`;
                chatWindow.appendChild(bubbleB);

                // Wydłużone opóźnienie (min. 7 sekund na spokojne przeczytanie treści i reakcji)
                setTimeout(() => {
                    const bubbleReaction = document.createElement('div');
                    bubbleReaction.className = 'chat-bubble speaker-a';
                    bubbleReaction.innerHTML = `<div class="speaker-name">Rozmówca A</div>${reactionText}`;
                    chatWindow.appendChild(bubbleReaction);

                    // Pokaż przycisk Kontynuuj
                    document.getElementById('next-btn').style.display = 'block';
                }, 1200);

            } else {
                selectedBtn.classList.add('incorrect');
                // Jeśli odpowiedź jest błędna, po krótkiej chwili pozwalamy spróbować ponownie
                setTimeout(() => {
                    selectedBtn.classList.remove('incorrect');
                    allBtns.forEach(btn => btn.disabled = false);
                }, 1500);
            }
        }

        function nextDialogue() {
            currentIndex++;
            if (currentIndex < dialogues.length) {
                renderDialogue();
            } else {
                showCompletion();
            }
        }

        function updateProgress() {
            const total = dialogues.length;
            const progressPct = ((currentIndex) / total) * 100;
            document.getElementById('progress-bar').style.width = `${progressPct}%`;
            document.getElementById('step-counter').textContent = `Dialog ${currentIndex + 1} / ${total}`;
        }

        function showCompletion() {
            document.getElementById('dialogue-card').style.display = 'none';
            document.getElementById('completion-screen').style.display = 'block';
            document.getElementById('progress-bar').style.width = '100%';
        }

        function markStageComplete() {
            const MODULE_KEY = 'm2_progress';
            let progress = JSON.parse(localStorage.getItem(MODULE_KEY)) || {};
            progress.stage5 = true;
            localStorage.setItem(MODULE_KEY, JSON.stringify(progress));
        }

        // Inicjalizacja
        renderDialogue();
    </script>
</body>
</html>
