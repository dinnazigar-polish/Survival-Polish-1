<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moduł 2 – Dialogi i Kontekst</title>
    <style>
        :root {
            --primary-salmon: #f49c96;
            --primary-salmon-hover: #e0857f;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-dark: #2c3e50;
            --text-muted: #7f8c8d;
            --border-light: #e2e8f0;
            --shadow-soft: 0 10px 30px rgba(0, 0, 0, 0.05);
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --success-color: #27ae60;
            --error-color: #e74c3c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-dark);
            line-height: 1.6;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .nav-links {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .back-link, .prev-link {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 0.95rem;
        }

        .back-link:hover, .prev-link:hover {
            color: var(--primary-salmon);
        }

        .progress-bar-container {
            width: 100%;
            height: 10px;
            background-color: var(--border-light);
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 2rem;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--primary-salmon);
            width: 0%;
            transition: width 0.3s ease;
        }

        .quiz-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: var(--shadow-soft);
            border: 2px solid var(--border-light);
        }

        .question-title {
            font-size: 1.35rem;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 1.2rem;
        }

        /* Czat Sekwencyjny */
        .chat-container {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-bottom: 1.2rem;
        }

        .chat-bubble {
            max-width: 88%;
            padding: 0.9rem 1.2rem;
            border-radius: 16px;
            font-size: 1rem;
            line-height: 1.4;
            animation: fadeIn 0.3s ease;
        }

        .chat-bubble.speaker-a {
            align-self: flex-start;
            background-color: #f1f5f9;
            color: var(--text-dark);
            border-bottom-left-radius: 4px;
        }

        .chat-bubble.speaker-b {
            align-self: flex-end;
            background-color: #fdf0ef;
            color: #b0463e;
            font-weight: 600;
            border-bottom-right-radius: 4px;
        }

        .speaker-name {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 0.2rem;
            color: var(--text-muted);
        }

        /* Opcje wyboru */
        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-bottom: 1.2rem;
        }

        .option-btn {
            background-color: #ffffff;
            border: 2px solid var(--border-light);
            padding: 1rem 1.2rem;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-dark);
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--primary-salmon);
            background-color: #fffaf9;
        }

        /* Sekcja Objaśnień i Kontekstu */
        .explanation-box {
            margin-top: 1.5rem;
            padding: 1.2rem;
            background-color: #fffaf9;
            border-radius: 16px;
            border: 2px dashed var(--primary-salmon);
            display: none;
        }

        .explanation-box.visible {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .explanation-title {
            font-weight: 800;
            color: #d96b63;
            margin-bottom: 0.8rem;
            font-size: 1.05rem;
        }

        .phrase-item {
            margin-bottom: 0.8rem;
        }

        .phrase-item:last-child {
            margin-bottom: 0;
        }

        .action-buttons {
            display: flex;
            gap: 0.8rem;
            margin-top: 1.2rem;
        }

        .next-btn {
            flex: 2;
            background-color: var(--primary-salmon);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            display: none;
            transition: background-color 0.2s ease;
        }

        .next-btn:hover {
            background-color: var(--primary-salmon-hover);
        }

        .prev-btn-action {
            flex: 1;
            background-color: #e2e8f0;
            color: var(--text-dark);
            border: none;
            padding: 1rem;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            display: none;
            transition: background-color 0.2s ease;
        }

        .prev-btn-action:hover {
            background-color: #cbd5e1;
        }

        .completion-screen {
            text-align: center;
            padding: 3rem 1rem;
            display: none;
        }

        .score-badge {
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--primary-salmon);
            margin-bottom: 1rem;
        }

        .btn-finish {
            display: inline-block;
            background-color: var(--primary-salmon);
            color: white;
            text-decoration: none;
            padding: 0.9rem 2rem;
            border-radius: 30px;
            font-weight: 700;
            margin-top: 1.5rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="nav-links">
                <a href="module-2-vocab.html" class="back-link">← Powrót do modułu</a>
                <button id="header-prev-btn" class="prev-link" onclick="prevDialog()" style="display: none;">← Poprzedni dialog</button>
            </div>
            <span id="step-counter" style="font-weight: 700; color: var(--text-muted);">Dialog 1 / 10</span>
        </div>

        <div class="progress-bar-container">
            <div class="progress-fill" id="progress-bar"></div>
        </div>

        <!-- Karta Dialogu -->
        <div class="quiz-card" id="quiz-card">
            <div class="question-title" id="dialog-title">---</div>

            <div class="chat-container" id="chat-container"></div>
            <div class="options-grid" id="dialog-options"></div>

            <!-- Sekcja Objaśnień po zakończeniu sekwencji -->
            <div class="explanation-box" id="explanation-box">
                <div class="explanation-title">💡 Tłumaczenie i słownictwo w kontekście:</div>
                <div id="explanation-text"></div>
            </div>

            <div class="action-buttons">
                <button class="prev-btn-action" id="prev-btn-action" onclick="prevDialog()">← Wróć</button>
                <button class="next-btn" id="next-btn" onclick="nextDialog()">Następny dialog →</button>
            </div>
        </div>

        <!-- Ekran Końcowy -->
        <div class="completion-screen" id="completion-screen">
            <h2>🎉 Wszystkie dialogi ukończone!</h2>
            <div class="score-badge" id="final-score">10 / 10</div>
            <p>Świetnie! Przeanalizowałeś wszystkie sekwencje rozmów i ich kontekst.</p>
            <a href="module-2-vocab.html" class="btn-finish" onclick="markStageComplete()">Powrót do modułu</a>
        </div>
    </div>

    <script>
        const dialoguesData = [
            {
                title: "Dialog 1: Odbieranie dzieci ze szkoły",
                firstComment: "Kto zwykle odbiera Wasze dzieci ze szkoły w tygodniu?",
                lastComments: [
                    "To bardzo wygodne rozwiązanie!",
                    "Aha, to świetny trening i spacer dla dzieci."
                ],
                choices: [
                    "Najczęściej robi to moja żona, ale czasami pomaga nam też babcia.",
                    "Moje dzieci chodzą do szkoły na piechotę z kolegami."
                ],
                correct: 0,
                phrases: [
                    { phrase: "odbierać dzieci", en: "to pick up children", ex: "Codziennie o 15:00 muszę odbierać dzieci ze szkoły." },
                    { phrase: "wygodne rozwiązanie", en: "convenient solution", ex: "Pomoc babci to dla nas bardzo wygodne rozwiązanie." }
                ]
            },
            {
                title: "Dialog 2: Zawód i praca mamy",
                firstComment: "Czym zajmuje się Twoja mama?",
                lastComments: [
                    "Uczenie matematyki brzmi jak bardzo trudne zadanie!",
                    "Piękne hobby!"
                ],
                choices: [
                    "Moja mama jest nauczycielką. Naucza matematyki i fizyki w szkole.",
                    "Moja mama bardzo lubi spędzać czas w ogrodzie."
                ],
                correct: 0,
                phrases: [
                    { phrase: "zajmować się", en: "to do for a living / deal with", ex: "Czym zajmujesz się w nowej pracy?" },
                    { phrase: "trudne zadanie", en: "difficult task", ex: "Praca w szkole to odpowiedzialne i trudne zadanie." }
                ]
            },
            {
                title: "Dialog 3: Nauka języka polskiego",
                firstComment: "Kto Ciebie nauczył tak dobrze mówić po polsku?",
                lastComments: [
                    "Twój dziadek jest Polakiem i mieszkał w Polsce?",
                    "Mówisz naprawdę świetnie po polsku!"
                ],
                choices: [
                    "Mój dziadek! Często ze mną rozmawiał, kiedy byłem mały.",
                    "Uczę się sam z internetu."
                ],
                correct: 0,
                phrases: [
                    { phrase: "świetnie", en: "excellently / greatly", ex: "Twój brat świetnie mówi po angielsku." },
                    { phrase: "wspaniale", en: "wonderfully", ex: "Spędziliśmy wspaniale czas na wakacjach." }
                ]
            },
            {
                title: "Dialog 4: Domowy wypiek",
                firstComment: "Kto upiekł ten pyszny tort na Twoje urodziny?",
                lastComments: [
                    "Jest naprawdę wyśmienity! Muszę poprosić ją o przepis.",
                    "O, to niesamowite, że można kupić tak smaczny tort w markecie!"
                ],
                choices: [
                    "Moja ciocia! Ona uwielbia piec ciasta dla całej rodziny.",
                    "Kupiłem ten tort wczoraj w markecie."
                ],
                correct: 0,
                phrases: [
                    { phrase: "wyśmienity", en: "delicious / exquisite", ex: "Ten tort czekoladowy jest naprawdę wyśmienity!" },
                    { phrase: "przepis", en: "recipe", ex: "Czy dasz mi przepis na to ciasto?" }
                ]
            },
            {
                title: "Dialog 5: Spotkania z rodziną",
                firstComment: "Czy masz rodzeństwo?",
                lastComments: [
                    "Cudownie! Moi rodzice też są już na emeryturze.",
                    "Bycie jedynakiem ma też swoje plusy!"
                ],
                choices: [
                    "Tak, mam brata i siostrę. Często odwiedzamy rodziców na emeryturze.",
                    "Nie, jestem jedynakiem."
                ],
                correct: 0,
                phrases: [
                    { phrase: "emerytura", en: "retirement", ex: "Mój dziadek jest na emeryturze i odpoczywa." },
                    { phrase: "rodzeństwo", en: "siblings", ex: "Czy Twoje rodzeństwo mieszka w Warszawie?" }
                ]
            },
            {
                title: "Dialog 6: Opis wyglądu",
                firstComment: "Jak wygląda Twój najlepszy przyjaciel?",
                lastComments: [
                    "Wydaje się bardzo miłą i sympatyczną osobą!",
                    "Super! Muzyka to wspaniała pasja."
                ],
                choices: [
                    "Jest wysoki, ma krótkie ciemne włosy i nosi okulary.",
                    "Mój przyjaciel bardzo lubi grać na gitarze."
                ],
                correct: 0,
                phrases: [
                    { phrase: "wygląda", en: "looks like", ex: "Jak wygląda Twój nowy brat?" },
                    { phrase: "wydaje się", en: "seems to be", ex: "Ten człowiek wydaje się bardzo sympatyczny." }
                ]
            },
            {
                title: "Dialog 7: Plany na weekend",
                firstComment: "Dokąd jedziecie w ten weekend?",
                lastComments: [
                    "Babcia na pewno ucieszy się z Waszej wizyty!",
                    "Czasami taki odpoczynek w domu też jest potrzebny."
                ],
                choices: [
                    "Jedziemy do naszej babci na niedzielny obiad.",
                    "Zostajemy w domu i sprzątamy."
                ],
                correct: 0,
                phrases: [
                    { phrase: "wizyta", en: "visit", ex: "To była bardzo udana wizyta u rodziny." },
                    { phrase: "gotować obiad", en: "to cook dinner", ex: "W niedzielę lubię gotować obiad dla bliskich." }
                ]
            },
            {
                title: "Dialog 8: Miejsca pracy",
                firstComment: "Gdzie pracuje Twoja siostra?",
                lastComments: [
                    "To słodka i przyjemna praca!",
                    "Studia to super czas, jaki kierunek wybrała?"
                ],
                choices: [
                    "Moja siostra pracuje w znanej cukierni w centrum miasta.",
                    "Ona studiuje na uniwersytecie."
                ],
                correct: 0,
                phrases: [
                    { phrase: "cukiernia", en: "pastry shop / bakery", ex: "Kupiłem pyszne pączki w lokalnej cukierni." }
                ]
            },
            {
                title: "Dialog 9: Poranny rytuał",
                firstComment: "Co zwykle robisz z żoną rano?",
                lastComments: [
                    "Nie ma nic lepszego niż spokojny poranek!",
                    "Oj, poranki bywają bardzo chaotyczne..."
                ],
                choices: [
                    "Zwykle pijemy razem kawę i rozmawiamy przed pracą.",
                    "Szybko wybiegamy z domu bez śniadania."
                ],
                correct: 0,
                phrases: [
                    { phrase: "pić kawę", en: "to drink coffee", ex: "Lubię pić kawę bez cukru o poranku." }
                ]
            },
            {
                title: "Dialog 10: Zakup prezentu",
                firstComment: "Co kupujesz dla brata na urodziny?",
                lastComments: [
                    "To genialny pomysł, na pewno się ucieszy!",
                    "Warto coś wymyślić, urodziny są tylko raz w roku!"
                ],
                choices: [
                    "Planuję kupować elegancki prezent – dobrą książkę.",
                    "Jeszcze nie wiem, nic nie kupuję."
                ],
                correct: 0,
                phrases: [
                    { phrase: "kupować prezent", en: "to buy a gift", ex: "Uwielbiam kupować prezenty dla mojej rodziny." }
                ]
            }
        ];

        let currentIndex = 0;

        function renderDialog() {
            const data = dialoguesData[currentIndex];
            
            document.getElementById('dialog-title').textContent = `${currentIndex + 1}. ${data.title}`;
            
            const chatContainer = document.getElementById('chat-container');
            const dialogOptions = document.getElementById('dialog-options');
            const explanationBox = document.getElementById('explanation-box');
            const nextBtn = document.getElementById('next-btn');
            const prevBtnAction = document.getElementById('prev-btn-action');
            const headerPrevBtn = document.getElementById('header-prev-btn');

            chatContainer.innerHTML = '';
            dialogOptions.innerHTML = '';
            explanationBox.classList.remove('visible');
            nextBtn.style.display = 'none';
            prevBtnAction.style.display = 'none';

            // Sterowanie widocznością przycisku powrotu w nagłówku
            if (currentIndex > 0) {
                headerPrevBtn.style.display = 'inline-block';
            } else {
                headerPrevBtn.style.display = 'none';
            }

            // Krok 1: Wypowiedź Osoby A
            addBubble('A', data.firstComment);

            // Krok 2: Opcje wyboru dla Osoby B
            data.choices.forEach((choiceText, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = choiceText;
                btn.onclick = () => handleChoice(idx, choiceText, data);
                dialogOptions.appendChild(btn);
            });

            updateProgress();
        }

        function handleChoice(selectedIdx, choiceText, data) {
            const dialogOptions = document.getElementById('dialog-options');
            dialogOptions.innerHTML = '';

            // Pokazujemy odpowiedź Osoby B
            addBubble('B', choiceText);

            // Krok 3: Komentarz kończący Osoby A (zależny od wybranej opcji)
            setTimeout(() => {
                const finalComment = Array.isArray(data.lastComments) 
                    ? data.lastComments[selectedIdx] 
                    : data.lastComment;

                addBubble('A', finalComment);

                // Krok 4: Sekcja tłumaczeń i wyjaśnień w kontekście
                let htmlContent = "";
                data.phrases.forEach(p => {
                    htmlContent += `
                        <div class="phrase-item">
                            🔹 <strong>${p.phrase}</strong> (🇬🇧 <em>${p.en}</em>)<br>
                            ✏️ Przykład w kontekście: „${p.ex}”
                        </div>
                    `;
                });

                document.getElementById('explanation-text').innerHTML = htmlContent;
                document.getElementById('explanation-box').classList.add('visible');
                document.getElementById('next-btn').style.display = 'block';

                if (currentIndex > 0) {
                    document.getElementById('prev-btn-action').style.display = 'block';
                }
            }, 300);
        }

        function addBubble(speaker, text) {
            const chatContainer = document.getElementById('chat-container');
            const bubble = document.createElement('div');
            bubble.className = `chat-bubble ${speaker === 'A' ? 'speaker-a' : 'speaker-b'}`;
            
            const label = document.createElement('div');
            label.className = 'speaker-name';
            label.textContent = speaker === 'A' ? 'Osoba A' : 'Osoba B';

            const txt = document.createElement('div');
            txt.textContent = text;

            bubble.appendChild(label);
            bubble.appendChild(txt);
            chatContainer.appendChild(bubble);
        }

        function nextDialog() {
            currentIndex++;
            if (currentIndex < dialoguesData.length) {
                renderDialog();
            } else {
                showCompletion();
            }
        }

        function prevDialog() {
            if (currentIndex > 0) {
                currentIndex--;
                renderDialog();
            }
        }

        function updateProgress() {
            const total = dialoguesData.length;
            const pct = ((currentIndex + 1) / total) * 100;
            document.getElementById('progress-bar').style.width = `${pct}%`;
            document.getElementById('step-counter').textContent = `Dialog ${currentIndex + 1} / ${total}`;
        }

        function showCompletion() {
            document.getElementById('quiz-card').style.display = 'none';
            document.getElementById('completion-screen').style.display = 'block';
            document.getElementById('progress-bar').style.width = '100%';
            document.getElementById('header-prev-btn').style.display = 'none';
        }

        function markStageComplete() {
            const MODULE_KEY = 'm2_progress';
            let progress = JSON.parse(localStorage.getItem(MODULE_KEY)) || {};
            progress.dialogues = true;
            localStorage.setItem(MODULE_KEY, JSON.stringify(progress));
        }

        // Start
        renderDialog();
    </script>
</body>
</html>
