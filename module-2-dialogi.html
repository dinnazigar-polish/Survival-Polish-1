<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moduł 2 – Etap 4: Dialogi</title>
    <style>
        :root {
            --primary-salmon: #f49c96;
            --primary-salmon-hover: #e0857f;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-dark: #2c3e50;
            --text-muted: #7f8c8d;
            --border-light: #e2e8f0;
            --shadow-soft: 0 10px 30px rgba(0, 0, 0, 0.05);
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --success-color: #27ae60;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-dark);
            line-height: 1.6;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .back-link {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
        }

        .back-link:hover {
            color: var(--primary-salmon);
        }

        .progress-bar-container {
            width: 100%;
            height: 10px;
            background-color: var(--border-light);
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 2rem;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--primary-salmon);
            width: 0%;
            transition: width 0.3s ease;
        }

        .dialog-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: var(--shadow-soft);
            border: 2px solid var(--border-light);
            margin-bottom: 1.5rem;
        }

        .dialog-title {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 1.5rem;
            padding-bottom: 0.8rem;
            border-bottom: 2px solid #fdf0ef;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .chat-bubble {
            max-width: 85%;
            padding: 0.9rem 1.2rem;
            border-radius: 18px;
            font-size: 1.05rem;
            line-height: 1.4;
            position: relative;
        }

        .chat-bubble.speaker-a {
            align-self: flex-start;
            background-color: #f1f5f9;
            color: var(--text-dark);
            border-bottom-left-radius: 4px;
        }

        .chat-bubble.speaker-b {
            align-self: flex-end;
            background-color: #fdf0ef;
            color: #b0463e;
            font-weight: 600;
            border-bottom-right-radius: 4px;
        }

        .speaker-name {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.2rem;
            color: var(--text-muted);
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-top: 1rem;
        }

        .option-btn {
            background-color: #ffffff;
            border: 2px solid var(--border-light);
            padding: 1rem;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-dark);
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .option-btn:hover {
            border-color: var(--primary-salmon);
            background-color: #fffaf9;
            transform: translateY(-2px);
        }

        /* Sekcja kluczowych fraz pod dialogiem */
        .phrases-box {
            margin-top: 1.5rem;
            padding: 1.2rem;
            background-color: #fffaf9;
            border-radius: 16px;
            border: 2px dashed var(--primary-salmon);
            display: none;
        }

        .phrases-box.visible {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        .phrases-title {
            font-size: 1.05rem;
            font-weight: 800;
            color: #d96b63;
            margin-bottom: 0.8rem;
        }

        .phrase-item {
            margin-bottom: 0.8rem;
            padding-bottom: 0.8rem;
            border-bottom: 1px solid var(--border-light);
        }

        .phrase-item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .phrase-head {
            font-weight: 700;
            color: var(--text-dark);
        }

        .phrase-en {
            font-style: italic;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .phrase-ex {
            font-size: 0.95rem;
            color: var(--text-dark);
            margin-top: 0.2rem;
        }

        .next-btn {
            width: 100%;
            background-color: var(--primary-salmon);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 1.5rem;
            display: none;
            transition: background-color 0.2s ease;
        }

        .next-btn:hover {
            background-color: var(--primary-salmon-hover);
        }

        .completion-screen {
            text-align: center;
            padding: 3rem 1rem;
            display: none;
        }

        .score-badge {
            font-size: 3rem;
            font-weight: 800;
            color: var(--primary-salmon);
            margin-bottom: 1rem;
        }

        .btn-finish {
            display: inline-block;
            background-color: var(--primary-salmon);
            color: white;
            text-decoration: none;
            padding: 0.9rem 2rem;
            border-radius: 30px;
            font-weight: 700;
            margin-top: 1.5rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <a href="module-2-vocab.html" class="back-link">← Powrót do listy etapów</a>
            <span id="step-counter" style="font-weight: 700; color: var(--text-muted);">Dialog 1 / 6</span>
        </div>

        <div class="progress-bar-container">
            <div class="progress-fill" id="progress-bar"></div>
        </div>

        <!-- Karta Dialogu -->
        <div class="dialog-card" id="dialog-card">
            <div class="dialog-title" id="dialog-title">💬 Rozmowa...</div>
            
            <div class="chat-container" id="chat-container"></div>

            <div class="options-container" id="options-container"></div>

            <!-- Sekcja fraz i definicji -->
            <div class="phrases-box" id="phrases-box">
                <div class="phrases-title">💡 Kluczowe frazy i słownictwo:</div>
                <div id="phrases-list"></div>
            </div>

            <button class="next-btn" id="next-btn" onclick="nextDialog()">Następny dialog →</button>
        </div>

        <!-- Ekran Końcowy -->
        <div class="completion-screen" id="completion-screen">
            <h2>🎉 Świetna robota! Dialogi ukończone</h2>
            <div class="score-badge">100%</div>
            <p>Przećwiczyłeś wszystkie sytuacje konwersacyjne z Modułu 2.</p>
            <a href="module-2-vocab.html" class="btn-finish" onclick="markStageComplete()">Zapisz i wróć do modułu</a>
        </div>
    </div>

    <script>
        const dialoguesData = [
            {
                title: "Kto odbiera Wasze dzieci ze szkoły?",
                dialogue: [
                    { speaker: "A", text: "Kto zwykle odbiera Wasze dzieci ze szkoły w tygodniu?" },
                    { speaker: "B", text: "Najczęściej robi to moja żona, ale czasami pomaga nam też babcia." },
                    { speaker: "A", text: "To bardzo wygodne rozwiązanie!" }
                ],
                phrases: [
                    {
                        phrase: "odbierać dzieci",
                        en: "to pick up children",
                        example: "Codziennie o godzinie 15:00 muszę odbierać dzieci ze szkoły."
                    },
                    {
                        phrase: "wygodne rozwiązanie",
                        en: "convenient solution",
                        example: "Praca zdalna z domu to dla naszej rodziny bardzo wygodne rozwiązanie."
                    }
                ]
            },
            {
                title: "Czym zajmuje się Twoja mama?",
                dialogue: [
                    { speaker: "A", text: "Czym zajmuje się Twoja mama?" },
                    { speaker: "B", text: "Moja mama jest nauczycielką. Naucza matematyki i fizyki w szkole.", isChoice: true },
                    { speaker: "A", text: "Uczenie matematyki brzmi jak bardzo trudne zadanie!" }
                ],
                choices: [
                    "Moja mama jest nauczycielką. Naucza matematyki i fizyki w szkole.",
                    "Moja mama pracowała dawniej w biurze, ale teraz jest na emeryturze."
                ],
                phrases: [
                    {
                        phrase: "zajmować się",
                        en: "to deal with / to do for a living",
                        example: "Czym zajmujesz się w wolnym czasie po pracy?"
                    },
                    {
                        phrase: "trudne",
                        en: "difficult / hard",
                        example: "To zadanie domowe jest bardzo trudne, potrzebuję pomocy."
                    }
                ]
            },
            {
                title: "Kto Ciebie nauczył tak dobrze mówić po polsku?",
                dialogue: [
                    { speaker: "A", text: "Kto Ciebie nauczył tak dobrze mówić po polsku?" },
                    { speaker: "B", text: "Mój dziadek! Często ze mną rozmawiał, kiedy byłem mały." },
                    { speaker: "A", text: "Mówisz naprawdę świetnie i wspaniale porozumiewasz się po polsku." }
                ],
                phrases: [
                    {
                        phrase: "świetnie",
                        en: "greatly / excellently",
                        example: "Twój brat świetnie gra w piłkę nożną."
                    },
                    {
                        phrase: "wspaniale",
                        en: "wonderfully / fantastically",
                        example: "Spędziliśmy wspaniale czas podczas wakacji u dziadków."
                    }
                ]
            },
            {
                title: "Kto upiekł ten pyszny tort?",
                dialogue: [
                    { speaker: "A", text: "Kto upiekł ten pyszny tort na Twoje urodziny?" },
                    { speaker: "B", text: "Moja ciocia! Ona uwielbia piec ciasta dla całej rodziny." },
                    { speaker: "A", text: "Jest naprawdę wyśmienity! Muszę poprosić ją o przepis." }
                ],
                phrases: [
                    {
                        phrase: "wyśmienity",
                        en: "delicious / exquisite",
                        example: "Obiad przygotowany przez moją babcię jest wyśmienity."
                    },
                    {
                        phrase: "przepis",
                        en: "recipe",
                        example: "Czy możesz dać mi przepis na ten pyszny sernik?"
                    }
                ]
            },
            {
                title: "Czy masz rodzeństwo?",
                dialogue: [
                    { speaker: "A", text: "Czy masz rodzeństwo?" },
                    { speaker: "B", text: "Tak, mam brata i siostrę." },
                    { speaker: "A", text: "Często się spotykacie?" },
                    { speaker: "B", text: "Tak, w każdy weekend odwiedzamy rodziców, którzy są już na emeryturze." }
                ],
                phrases: [
                    {
                        phrase: "emerytura",
                        en: "retirement",
                        example: "Mój dziadek jest już na emeryturze i ma dużo wolnego czasu."
                    },
                    {
                        phrase: "Często się spotykacie?",
                        en: "Do you meet often?",
                        example: "Mieszkamy w tym samym mieście. Często się spotykacie z przyjaciółmi?"
                    }
                ]
            },
            {
                title: "Jak wygląda Twój najlepszy przyjaciel?",
                dialogue: [
                    { speaker: "A", text: "Jak wygląda Twój najlepszy przyjaciel?" },
                    { speaker: "B", text: "Jest wysoki, ma krótkie ciemne włosy i nosi okulary." },
                    { speaker: "A", text: "Wydaje się bardzo miłą i sympatyczną osobą!" }
                ],
                phrases: [
                    {
                        phrase: "wygląda",
                        en: "looks like / appears",
                        example: "Jak wygląda Twój nowy dom w Warszawie?"
                    },
                    {
                        phrase: "Wydaje się",
                        en: "It seems / He seems",
                        example: "Ten nowy nauczyciel wydaje się bardzo sympatyczny."
                    }
                ]
            }
        ];

        let currentDialogIndex = 0;

        function renderDialogue() {
            const currentData = dialoguesData[currentDialogIndex];
            
            document.getElementById('dialog-title').textContent = `💬 ${currentData.title}`;
            
            const chatContainer = document.getElementById('chat-container');
            const optionsContainer = document.getElementById('options-container');
            const phrasesBox = document.getElementById('phrases-box');
            const nextBtn = document.getElementById('next-btn');

            chatContainer.innerHTML = '';
            optionsContainer.innerHTML = '';
            phrasesBox.classList.remove('visible');
            nextBtn.style.display = 'none';

            // Jeśli dialog zawiera wybór dla użytkownika
            let hasChoices = !!currentData.choices;

            currentData.dialogue.forEach((line) => {
                if (line.isChoice && hasChoices) {
                    // Miejsce, gdzie użytkownik musi wybrać odpowiedź
                    currentData.choices.forEach((choiceText) => {
                        const btn = document.createElement('button');
                        btn.className = 'option-btn';
                        btn.textContent = choiceText;
                        btn.onclick = () => selectChoice(choiceText);
                        optionsContainer.appendChild(btn);
                    });
                } else {
                    const bubble = document.createElement('div');
                    bubble.className = `chat-bubble ${line.speaker === 'A' ? 'speaker-a' : 'speaker-b'}`;
                    
                    const speakerLabel = document.createElement('div');
                    speakerLabel.className = 'speaker-name';
                    speakerLabel.textContent = line.speaker === 'A' ? 'Osoba A' : 'Osoba B';

                    const textSpan = document.createElement('div');
                    textSpan.textContent = line.text;

                    bubble.appendChild(speakerLabel);
                    bubble.appendChild(textSpan);
                    chatContainer.appendChild(bubble);
                }
            });

            // Jeśli brak interaktywnego wyboru, bezpośrednio pokazujemy cały dialog i frazy
            if (!hasChoices) {
                showPhrases(currentData.phrases);
                nextBtn.style.display = 'block';
            }

            updateProgress();
        }

        function selectChoice(selectedText) {
            const currentData = dialoguesData[currentDialogIndex];
            const chatContainer = document.getElementById('chat-container');
            const optionsContainer = document.getElementById('options-container');
            
            optionsContainer.innerHTML = ''; // czyszczenie przycisków

            // Dokładamy wybraną i pozostałe wypowiedzi do czatu
            currentData.dialogue.forEach((line) => {
                if (line.isChoice) {
                    const bubble = document.createElement('div');
                    bubble.className = 'chat-bubble speaker-b';
                    
                    const speakerLabel = document.createElement('div');
                    speakerLabel.className = 'speaker-name';
                    speakerLabel.textContent = 'Osoba B';

                    const textSpan = document.createElement('div');
                    textSpan.textContent = selectedText;

                    bubble.appendChild(speakerLabel);
                    bubble.appendChild(textSpan);
                    chatContainer.appendChild(bubble);
                } else if (chatContainer.children.length < currentData.dialogue.length) {
                    // Dodaj kolejne linie, jeśli jeszcze ich nie ma
                    const bubble = document.createElement('div');
                    bubble.className = `chat-bubble ${line.speaker === 'A' ? 'speaker-a' : 'speaker-b'}`;
                    
                    const speakerLabel = document.createElement('div');
                    speakerLabel.className = 'speaker-name';
                    speakerLabel.textContent = line.speaker === 'A' ? 'Osoba A' : 'Osoba B';

                    const textSpan = document.createElement('div');
                    textSpan.textContent = line.text;

                    bubble.appendChild(speakerLabel);
                    bubble.appendChild(textSpan);
                    chatContainer.appendChild(bubble);
                }
            });

            showPhrases(currentData.phrases);
            document.getElementById('next-btn').style.display = 'block';
        }

        function showPhrases(phrasesArray) {
            const phrasesList = document.getElementById('phrases-list');
            phrasesList.innerHTML = '';

            phrasesArray.forEach(item => {
                const phraseDiv = document.createElement('div');
                phraseDiv.className = 'phrase-item';
                phraseDiv.innerHTML = `
                    <div class="phrase-head">🔹 ${item.phrase} <span class="phrase-en">(${item.en})</span></div>
                    <div class="phrase-ex">✏️ Przykład: „${item.example}”</div>
                `;
                phrasesList.appendChild(phraseDiv);
            });

            document.getElementById('phrases-box').classList.add('visible');
        }

        function nextDialog() {
            currentDialogIndex++;
            if (currentDialogIndex < dialoguesData.length) {
                renderDialogue();
            } else {
                showCompletion();
            }
        }

        function updateProgress() {
            const total = dialoguesData.length;
            const progressPct = (currentDialogIndex / total) * 100;
            document.getElementById('progress-bar').style.width = `${progressPct}%`;
            document.getElementById('step-counter').textContent = `Dialog ${currentDialogIndex + 1} / ${total}`;
        }

        function showCompletion() {
            document.getElementById('dialog-card').style.display = 'none';
            document.getElementById('completion-screen').style.display = 'block';
            document.getElementById('progress-bar').style.width = '100%';
        }

        function markStageComplete() {
            const MODULE_KEY = 'm2_progress';
            let progress = JSON.parse(localStorage.getItem(MODULE_KEY)) || {};
            progress.stage4 = true;
            localStorage.setItem(MODULE_KEY, JSON.stringify(progress));
        }

        // Start
        renderDialogue();
    </script>
</body>
</html>
