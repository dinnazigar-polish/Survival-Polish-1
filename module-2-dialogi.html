<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moduł 2 – Etap 5: Dialogi</title>
    <style>
        :root {
            --primary-salmon: #f49c96;
            --primary-salmon-hover: #e0857f;
            --badge-salmon-bg: #fdf0ef;
            --badge-salmon-text: #d96b63;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-dark: #2c3e50;
            --text-muted: #7f8c8d;
            --border-light: #e2e8f0;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font-family); background-color: var(--bg-color); color: var(--text-dark); padding: 2rem 1rem; }
        .container { max-width: 650px; margin: 0 auto; }
        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .back-link { color: var(--text-muted); text-decoration: none; font-weight: 600; }
        .back-link:hover { color: var(--primary-salmon); }
        .counter-badge { background-color: var(--badge-salmon-bg); color: var(--badge-salmon-text); font-weight: 700; padding: 0.4rem 1rem; border-radius: 20px; }

        .chat-box { background: var(--card-bg); border-radius: 24px; padding: 1.5rem; border: 2px solid var(--border-light); margin-bottom: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
        .bubble { padding: 0.9rem 1.2rem; border-radius: 18px; max-width: 80%; font-weight: 600; }
        .bubble.left { background-color: var(--bg-color); border: 1px solid var(--border-light); align-self: flex-start; }
        .bubble.right { background-color: var(--badge-salmon-bg); color: var(--badge-salmon-text); align-self: flex-end; }

        .opt-btn { background: var(--card-bg); border: 2px solid var(--border-light); border-radius: 12px; padding: 0.9rem; font-weight: 600; cursor: pointer; text-align: left; margin-bottom: 0.5rem; width: 100%; }
        .opt-btn:hover { border-color: var(--primary-salmon); }

        .btn { background-color: var(--primary-salmon); color: white; font-weight: 700; padding: 0.9rem 1.8rem; border-radius: 30px; border: none; cursor: pointer; text-decoration: none; display: inline-block; width: 100%; text-align: center; }
        .btn:hover { background-color: var(--primary-salmon-hover); }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-nav">
            <a href="module-2-vocab.html" class="back-link">← Powrót do Modułu 2</a>
            <span class="counter-badge" id="counter">Dialog 1 / 3</span>
        </div>

        <div id="dialog-area">
            <div class="chat-box" id="chat"></div>
            <div id="options-box"></div>
        </div>

        <div id="comp-area" style="display: none; text-align: center; background: var(--card-bg); padding: 2rem; border-radius: 24px; border: 2px solid var(--border-light);">
            <h2>💬 Dialogi ukończone!</h2>
            <p style="color: var(--text-muted); margin: 1rem 0 2rem;">Świetnie radzisz sobie z konwersacjami o rodzinie!</p>
            <a href="module-2-vocab.html" class="btn">Powrót do menu modułu</a>
        </div>
    </div>

    <script>
        const dialogues = [
            {
                speaker1: "Cześć! Z kim dzisiaj jesz obiad?",
                speaker2Opts: [
                    { text: "Jem obiad razem z moją rodziną.", correct: true },
                    { text: "Mój sąsiad mieszkać daleko.", correct: false }
                ],
                reply: "Super! A Twoja mama też będzie?"
            },
            {
                speaker1: "Czy Twój brat mieszka w Warszawie?",
                speaker2Opts: [
                    { text: "Tak, mój brat i siostra mieszkają razem w Warszawie.", correct: true },
                    { text: "Nie, moja żona to przyjaciółka.", correct: false }
                ],
                reply: "To świetnie! Często ich odwiedzasz?"
            },
            {
                speaker1: "Kto Ci pomaga w ogrodzie?",
                speaker2Opts: [
                    { text: "Mój dobry sąsiad i wujek zawsze mi pomagają.", correct: true },
                    { text: "Rodzice rozmawiać gotować.", correct: false }
                ],
                reply: "Masz bardzo miłych bliskich!"
            }
        ];

        let curIdx = 0;

        function loadDialog() {
            document.getElementById('counter').textContent = `Dialog ${curIdx + 1} / ${dialogues.length}`;
            const d = dialogues[curIdx];
            const chat = document.getElementById('chat');
            chat.innerHTML = `<div class="bubble left">${d.speaker1}</div>`;

            const optsBox = document.getElementById('options-box');
            optsBox.innerHTML = '';
            d.speaker2Opts.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'opt-btn';
                btn.textContent = opt.text;
                btn.onclick = () => selectOpt(opt, d.reply);
                optsBox.appendChild(btn);
            });
        }

        function selectOpt(opt, reply) {
            if (!opt.correct) return alert("Spróbuj wybrać bardziej naturalną odpowiedź!");

            const chat = document.getElementById('chat');
            chat.innerHTML += `<div class="bubble right">${opt.text}</div>`;
            document.getElementById('options-box').innerHTML = '';

            setTimeout(() => {
                chat.innerHTML += `<div class="bubble left">${reply}</div>`;
                setTimeout(() => {
                    curIdx++;
                    if (curIdx < dialogues.length) {
                        loadDialog();
                    } else {
                        finishStage();
                    }
                }, 1500);
            }, 600);
        }

        function finishStage() {
            let progress = JSON.parse(localStorage.getItem('m2_progress') || '{}');
            progress.stage5 = true;
            localStorage.setItem('m2_progress', JSON.stringify(progress));
            document.getElementById('dialog-area').style.display = 'none';
            document.getElementById('comp-area').style.display = 'block';
        }

        loadDialog();
    </script>
</body>
</html>
